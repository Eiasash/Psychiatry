# Zero-build site: serve the repo root as-is. The empty command stops Netlify
# from attempting an auto-detected build when the GitHub repo is linked for
# continuous deployment.
[build]
  command = ""
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["data/questions.json", "data/explanations.json", "docs/answer_key_doubts.json"]

[[redirects]]
  from = "/data/questions.json"
  to = "/api/protected-asset?path=data/questions.json"
  status = 200
  force = true

[[redirects]]
  from = "/data/explanations.json"
  to = "/api/protected-asset?path=data/explanations.json"
  status = 200
  force = true

[[redirects]]
  from = "/docs/answer_key_doubts.json"
  to = "/api/protected-asset?path=docs/answer_key_doubts.json"
  status = 200
  force = true

# Security headers (Netlify deploy only; GitHub Pages serves the same app without these).
# CSP is scoped to the app's actual connection set: same-origin (/api/*, data, static) +
# Supabase REST/auth at *.supabase.co. 'unsafe-inline' is required because this is a
# single-file PWA with inline <script>/<style>; there is no eval/new Function, so no
# 'unsafe-eval'. No external scripts, CDNs, fonts, or websockets are used.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://*.supabase.co; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
