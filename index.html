<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<meta name="description" content="בנק שאלות שלב א' בפסיכיאטריה — מבחני המועצה המדעית / הר&quot;י, 2020–2025. תרגול MCQ עם חזרה מרווחת והסברים בעברית." />
<meta name="robots" content="index,follow" />
<link rel="canonical" href="https://psychiatry-szmc.netlify.app/" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<meta property="og:title" content="שלב א' פסיכיאטריה — בנק שאלות" />
<meta property="og:description" content="900 שאלות מבחן אמיתיות, מפתחות רשמיים לאחר ערעור, הסברים בעברית וחזרה מרווחת." />

<meta name="twitter:title" content="שלב א' פסיכיאטריה — בנק שאלות" />
<meta name="twitter:description" content="900 שאלות מבחן אמיתיות עם הסברים בעברית וחזרה מרווחת." />
<meta name="twitter:image" content="https://psychiatry-szmc.netlify.app/icons/icon-512.png" />
<title>שלב א' פסיכיאטריה — בנק שאלות</title>
<style>
:root{
  --bg:#0b1020; --bg2:#11172e; --card:#161d38; --card2:#1c2547;
  --line:#28315a; --txt:#e8ecfb; --muted:#9aa6d4; --faint:#92a0d6;
  --accent:#5b4bd6; --accent2:#22d3b7; --accent-d:#4938bf;
  --good:#34d399; --good-bg:#0f3d33; --bad:#fb7185; --bad-bg:#3d1622;
  --warn:#fbbf24; --chip:#222c52; --focus:#ffffff; --shadow:0 10px 40px rgba(0,0,0,.45);
  --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-padding-top:12px}
html,body{margin:0;padding:0}
body{
  font-family:"Segoe UI",Rubik,Arial,system-ui,sans-serif;
  background:radial-gradient(1200px 700px at 80% -10%,#1a2348 0,transparent 60%),
             radial-gradient(900px 600px at -10% 10%,#10243a 0,transparent 55%),var(--bg);
  color:var(--txt);min-height:100vh;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:880px;margin:0 auto;padding:14px 14px calc(112px + env(safe-area-inset-bottom))}
a{color:var(--accent2)}
button,input,select{font-family:inherit}
button{touch-action:manipulation}
button:focus{outline:none}
button:focus-visible,input:focus-visible,.fb:focus-visible,.ai-output:focus-visible{
  outline:3px solid var(--focus);
  outline-offset:3px;
  box-shadow:0 0 0 6px rgba(34,211,183,.28);
}
select:focus-visible{
  outline:3px solid var(--focus);
  outline-offset:3px;
  box-shadow:0 0 0 6px rgba(34,211,183,.28);
}
.hidden{display:none!important}
.skip-link{position:fixed;top:8px;right:8px;z-index:100;background:var(--focus);color:var(--bg);
  border-radius:10px;padding:10px 14px;font-weight:800;transform:translateY(-140%);transition:.15s transform}
.skip-link:focus{transform:translateY(0);outline:3px solid var(--accent2);outline-offset:2px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ---- header ---- */
header.app{
  display:flex;align-items:center;gap:12px;padding:10px 4px 16px;
}
.logo{
  width:46px;height:46px;border-radius:13px;flex:0 0 auto;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;font-size:26px;box-shadow:var(--shadow);
}
.htxt h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px}
.htxt p{margin:1px 0 0;font-size:12.5px;color:var(--muted)}
.htxt{flex:1;min-width:0}

/* ---- cards / grid ---- */
.card{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);
  border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:560px){.g3{grid-template-columns:1fr 1fr}}

.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
.stat .n{font-size:26px;font-weight:800;color:var(--accent2)}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px}

h2.sec{font-size:14px;color:var(--muted);font-weight:600;margin:22px 4px 10px;text-transform:uppercase;letter-spacing:1px}

/* ---- buttons ---- */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  border:1px solid var(--line);background:var(--card2);color:var(--txt);
  padding:14px 16px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;
  transition:.15s transform,.15s background,.15s border-color}
.btn:hover{background:#222c52;border-color:var(--accent)}
.btn:active{transform:scale(.98)}
.btn.primary{background:linear-gradient(135deg,var(--accent-d),var(--accent));border:none}
.btn.primary:hover{filter:brightness(1.08)}
.btn.warn{border-color:var(--warn);color:var(--warn)}
.btn .ic{font-size:19px}
.btn .sub{font-size:11.5px;color:var(--muted);font-weight:500}
.btn.col{flex-direction:column;gap:3px;text-align:center}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.iconbtn{width:44px;min-width:44px;height:44px;border-radius:12px;border:1px solid var(--line);
  background:var(--card2);color:var(--txt);display:grid;place-items:center;cursor:pointer;font-size:18px}
.iconbtn.on{background:rgba(251,191,36,.18);border-color:var(--warn);color:var(--warn)}
.timer{font-variant-numeric:tabular-nums;color:var(--warn);font-weight:800}

/* ---- chips ---- */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--chip);border:1px solid var(--line);border-radius:999px;
  min-height:44px;padding:7px 13px;font-size:13px;cursor:pointer;color:var(--txt);transition:.15s;display:flex;gap:7px;align-items:center}
.chip:hover{border-color:var(--accent)}
.chip .c{color:var(--faint);font-size:12px}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.on .c{color:#fff}

/* ---- quiz ---- */
.qhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;font-size:12.5px;color:var(--muted)}
.qmeta{display:flex;gap:6px;flex-wrap:wrap}
.tag{background:var(--chip);border:1px solid var(--line);border-radius:8px;padding:2px 9px;font-size:11.5px;color:var(--muted)}
.tag.acc{color:var(--accent2);border-color:var(--accent2)}
.progbar{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;margin:4px 0 14px}
.progbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s width}
.qtext{font-size:18px;font-weight:600;line-height:1.7;margin:6px 0 16px}
.opts{display:grid;gap:10px}
.opt{display:flex;gap:12px;align-items:flex-start;background:var(--card2);border:1.5px solid var(--line);
  border-radius:13px;min-height:56px;padding:13px 14px;cursor:pointer;font-size:15.5px;transition:.13s;text-align:right;width:100%;color:var(--txt)}
.opt:hover{border-color:var(--accent)}
.opt .k{flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:var(--chip);
  display:grid;place-items:center;font-weight:700;font-size:14px;color:var(--muted)}
.opt .ot{flex:1;padding-top:1px;unicode-bidi:plaintext}
.opt.correct{border-color:var(--good);background:var(--good-bg)}
.opt.correct .k{background:var(--good);color:#04231a}
.opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
.opt.wrong .k{background:var(--bad);color:#3d0a14}
.opt.dim{opacity:.55}
.opt.sel{border-color:var(--accent);background:#222c52}
.opt.sel .k{background:var(--accent);color:#fff}
.exam-banner{font-size:12px;color:var(--muted);margin:-4px 0 12px;display:flex;gap:10px;flex-wrap:wrap}
.exam-banner b{color:var(--accent2)}
.opt[disabled]{cursor:default}

.fb{margin-top:14px;border-radius:13px;padding:13px 15px;font-size:14px;display:none;text-align:right;overflow-wrap:anywhere}
.fb.show{display:block}
.fb.ok{background:var(--good-bg);border:1px solid var(--good)}
.fb.no{background:var(--bad-bg);border:1px solid var(--bad)}
.fb .ref{margin-top:7px;font-size:13px;color:var(--muted)}
.fb .ref b{color:var(--accent2);font-weight:600}
.expl{margin-top:10px;padding:11px 13px;background:rgba(124,108,255,.10);border:1px solid var(--line);border-radius:11px;font-size:14px;line-height:1.75;unicode-bidi:plaintext;text-align:right;overflow-wrap:anywhere}
.expl-h{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--accent2);margin-bottom:5px}
.fb .note{margin-top:6px;font-size:12.5px;color:var(--warn)}

.qfoot{display:flex;gap:10px;margin-top:16px}
.qfoot .btn{flex:1}
.quiz-sticky-actions{z-index:5}

/* ---- browse / search ---- */
.search{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;
  color:var(--txt);min-height:48px;padding:13px 15px;font-size:15px;font-family:inherit}
.search:focus{border-color:var(--accent)}
.qitem{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px}
.qitem .qq{font-weight:600;margin-bottom:8px}
.qitem .oo{font-size:14px;color:var(--muted);padding:3px 0;unicode-bidi:plaintext}
.qitem .oo.c{color:var(--good);font-weight:600}
.qitem .meta{font-size:11.5px;color:var(--faint);margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.hl{background:rgba(251,191,36,.2);color:var(--txt);border-bottom:1px solid var(--warn)}
.pager{display:flex;gap:8px;align-items:center;justify-content:space-between;margin:10px 0}
.pager .btn{width:auto;min-width:96px;padding:10px 12px}
.review-list{display:grid;gap:10px;margin-top:12px}
.review-row{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px}
.review-row.ok{border-color:var(--good)}
.review-row.no{border-color:var(--bad)}
.ai-box{margin-top:10px;padding:12px;border:1px solid rgba(34,211,183,.35);border-radius:12px;background:var(--card2);box-shadow:inset -3px 0 0 rgba(34,211,183,.55);overflow-wrap:anywhere;text-align:right}
.ai-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.ai-actions .btn{width:auto;min-height:44px;padding:9px 12px;font-size:13px}
.ai-output{margin-top:10px;direction:rtl;unicode-bidi:isolate;line-height:1.75;color:var(--txt);text-align:right;overflow-wrap:anywhere}
.ai-output[aria-busy="true"]{min-height:74px}
.ai-status{display:grid;gap:4px;margin-top:10px;padding:10px;border-radius:10px;background:rgba(11,16,32,.24)}
.ai-status b{color:var(--accent2)}
.ai-status span{color:var(--muted);font-size:13px}
.ai-loading{border:1px solid var(--line);box-shadow:inset -2px 0 0 rgba(34,211,183,.45)}
.ai-error{border:1px solid var(--bad);background:rgba(61,22,34,.38);box-shadow:inset -2px 0 0 rgba(251,113,133,.55)}
.ai-error .btn{width:auto;margin-top:8px;min-height:40px;padding:8px 12px}
.ai-answer{direction:rtl;text-align:right;unicode-bidi:isolate}
.ai-output p{margin:0 0 10px}
.ai-output p:last-child{margin-bottom:0}
.ai-section{margin:10px 0;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:rgba(11,16,32,.18)}
.ai-section:first-child{margin-top:0}
.ai-section:last-child{margin-bottom:0}
.ai-section>:last-child{margin-bottom:0}
.ai-output h4{font-size:14px;line-height:1.45;margin:14px 0 6px;color:var(--accent2);font-weight:800;letter-spacing:0}
.ai-output h4:first-child{margin-top:0}
.ai-output strong{color:#fff;font-weight:800}
.ai-output code{direction:ltr;unicode-bidi:isolate;background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:1px 5px}
.ai-output ul{margin:0 0 10px;padding:0 18px 0 0}
.ai-output li{margin:4px 0}
.ai-table{width:100%;border-collapse:separate;border-spacing:0;margin:10px 0;font-size:13px;direction:rtl}
.ai-table th,.ai-table td{border-bottom:1px solid var(--line);padding:7px 6px;text-align:right;vertical-align:top;overflow-wrap:anywhere}
.ai-table th{color:var(--accent2);font-weight:800}
.ai-table tr:last-child td{border-bottom:0}
.ai-quote{margin:10px 0;padding:8px 10px;border-right:3px solid var(--accent2);border-radius:9px;background:rgba(34,211,183,.08);font-weight:800;color:var(--txt)}
.ai-rule{border:0;border-top:1px solid var(--line);margin:12px 0}
.ai-citations{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
.ai-citations span:first-child{font-weight:800;color:var(--accent2)}
@media(max-width:560px){
  .wrap{padding-inline:10px;padding-top:10px}
  .card{padding:14px;border-radius:14px}
  .g3{grid-template-columns:1fr 1fr}
  .qhead{align-items:flex-start}
  .qtext{font-size:17px;line-height:1.65}
  .opt{padding:12px;gap:10px}
  .fb.show{margin-inline:-4px;padding:12px 10px}
  .expl{padding:10px 9px;font-size:13.8px;line-height:1.72}
  .quiz-sticky-actions{position:sticky;bottom:calc(66px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(23,31,61,0),var(--card) 35%);padding-top:8px}
  .ai-box{margin-inline:-2px;padding:10px;border-left:0;border-right:0;border-radius:10px;box-shadow:inset -2px 0 0 rgba(34,211,183,.55)}
  .ai-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ai-actions .btn{width:100%;min-height:44px;padding:8px 10px;font-size:13px}
  .ai-output{font-size:14px;line-height:1.72}
  .ai-section{padding:10px;margin:8px 0;border-radius:10px}
  .ai-output h4{font-size:14px;margin:12px 0 6px}
  .ai-table{display:block;font-size:13px}
  .ai-table thead{display:none}
  .ai-table tbody,.ai-table tr,.ai-table td{display:block;width:100%}
  .ai-table tr{border:1px solid var(--line);border-radius:10px;margin:8px 0;padding:6px;background:rgba(11,16,32,.18)}
  .ai-table td{border:0;padding:4px 4px}
  .ai-table td::before{content:attr(data-label);display:block;margin-bottom:1px;color:var(--accent2);font-size:11px;font-weight:800}
  .ai-quote{padding:8px 9px}
  .ai-citations{display:grid;gap:4px}
  .ai-source-contract{padding:8px 9px}
}

/* ---- bottom nav ---- */
nav.bar{position:fixed;bottom:0;left:0;right:0;background:rgba(11,16,32,.92);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;z-index:20;
  padding-bottom:env(safe-area-inset-bottom)}
nav.bar button{flex:1;background:none;border:none;color:var(--faint);padding:9px 4px 8px;
  min-height:52px;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600}
nav.bar button .ni{font-size:20px}
nav.bar button.on{color:var(--accent2)}

/* progress ring */
.ring{position:relative;width:120px;height:120px;margin:0 auto}
.ring svg{transform:rotate(-90deg)}
.ring .mid{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring .mid b{font-size:24px;font-weight:800}
.ring .mid span{font-size:11px;color:var(--muted)}
.muted{color:var(--muted)} .small{font-size:12.5px}
.kbd{font-size:11px;color:var(--faint);background:var(--chip);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
.toast{position:fixed;bottom:78px;right:50%;transform:translateX(50%);background:var(--card2);
  border:1px solid var(--accent);border-radius:10px;padding:9px 16px;font-size:13px;z-index:40;
  opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.auth-card{max-width:520px;margin:24px auto 0}
.auth-form{display:grid;gap:12px;margin-top:14px}
.field{display:grid;gap:6px}
.field label{font-size:13px;color:var(--muted);font-weight:700}
.input{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;
  color:var(--txt);min-height:48px;padding:12px 14px;font-size:15px}
.input:focus{border-color:var(--accent)}
.auth-msg{min-height:22px;color:var(--warn);font-size:13px}
.update-banner{position:fixed;left:12px;right:12px;bottom:78px;z-index:45;max-width:720px;margin:auto;background:var(--card);
  border:1px solid var(--accent2);border-radius:14px;box-shadow:var(--shadow);padding:10px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.update-banner b{display:block;color:var(--txt);font-size:13.5px}
.update-banner small{display:block;color:var(--muted);font-size:12px}
.update-banner .btn{width:auto;min-height:44px;padding:8px 14px}
.home-brief{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.canonical-host-note{border-color:rgba(251,191,36,.45);margin-bottom:14px}
.canonical-host-note b{color:var(--warn)}
.canonical-host-note .toolbar{margin-top:10px}
.brief-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.brief-head strong{font-size:16px;color:var(--txt);line-height:1.55}
.eyebrow{font-size:11px;font-weight:800;color:var(--accent2);border:1px solid rgba(34,211,183,.45);border-radius:999px;padding:2px 9px;white-space:nowrap}
.brief-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.brief-item{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:12.5px;color:var(--muted)}
.brief-item b{display:block;color:var(--txt);font-size:13.5px}
.brief-notes{display:grid;gap:5px;margin-top:10px;font-size:12.5px;color:var(--warn)}
.home-actions{margin-top:10px}
.home-actions .btn{min-height:62px}
.home-progress{margin-top:14px;text-align:center}
.study-next-card{margin-top:14px;border-color:rgba(34,211,183,.30)}
.study-next-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.study-next-head b{font-size:15px}
.study-next-head span{font-size:12.5px;color:var(--muted)}
.study-next-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.study-next-actions .btn{min-height:58px;padding:10px 12px}
.topic-stat-row{display:grid;gap:5px;margin:10px 0}
.topic-stat-row .topic-stat-meta{display:flex;justify-content:space-between;gap:8px;font-size:13px;align-items:flex-start}
.topic-stat-row .topic-stat-detail{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.review-primer{margin:0 0 14px;padding:12px 13px;border:1px solid rgba(34,211,183,.35);border-radius:12px;background:rgba(34,211,183,.08);font-size:13.8px;line-height:1.72;unicode-bidi:plaintext;overflow-wrap:anywhere}
.review-primer .ref{margin-top:7px;color:var(--muted);font-size:12.5px}
.home-section{background:rgba(11,16,32,.12);border-radius:11px}
.home-catalog{margin-top:16px}
.catalog-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.catalog-head b{font-size:15px}
.catalog-details{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}
.catalog-details summary{cursor:pointer;color:var(--txt);font-weight:800;min-height:44px;display:flex;align-items:center}
.catalog-details summary::marker{color:var(--accent2)}
.catalog-sub{margin:10px 0 6px;font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px}
.chip-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(156px,1fr));gap:8px}
.chip-grid .chip{justify-content:space-between;border-radius:12px;width:100%;min-width:0}
.ai-drill-card{margin-top:16px;border-color:rgba(34,211,183,.35)}
.ai-drill-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}

<script>
"use strict";
const LETTERS = ["א","ב","ג","ד"];
const PROG_KEY = "psych_shlava_progress_v1";
const STAR_KEY = "psych_shlava_stars_v1";
const SESSION_KEY = "psych_shlava_session_v1";
const INSTALL_COACH_KEY = "psych_shlava_install_coach_v1";
const SUPABASE_SESSION_KEY = "psych_shlava_supabase_session_v1";
const AUTH_REQUIRED_KEY = "psych_shlava_auth_required_v1";
const DB_NAME = "psych_shlava_local_v1";
const DB_STORE = "kv";
const PAGE_SIZE = 100;
const EXAM_SECONDS_PER_Q = 72;
const AI_QUESTION_APP_URL = "https://psychiatry-szmc.netlify.app/";
const AI_SYLLABUS_SOURCES = [
  {value:"synopsis",label:"Kaplan & Sadock Synopsis",hint:"סיכום ליבה לבחינה"},
  {value:"dsm",label:"DSM diagnostic criteria",hint:"קריטריונים ואבחנה מבדלת"},
  {value:"psychopharm",label:"Psychopharmacology syllabus",hint:"תרופות, מנגנונים ותופעות לוואי"},
  {value:"ethics",label:"Law, ethics and board syllabus",hint:"חוק, אתיקה ומבנה הבחינה"}
];
let QUESTIONS = [], TOPICS = [], SYLLABUS = null, PRACTICE = [], AI_LAST = null, PROG = {}, EXP = {}, KEY_DOUBTS = {}, QMAP = new Map(), AIMAP = new Map();
// AI practice questions are kept in a separate pool (data/practice_questions.json) and a
// separate lookup map. They are browsable/drillable alongside the verified 900-bank but are
// NEVER added to QUESTIONS/QMAP, so they never enter the official progress/Leitner/stats
// (all of which iterate QUESTIONS). isAiId() is the single guard used everywhere.
const isAiId = id => typeof id === "string" && id.startsWith("ai-");
let STARS = new Set();
let EXP_PROMISE = null;
let DB_PROMISE = null;
let timerHandle = null;
let storageWarned = false;
let persistAsked = false;
let lastCompletedSession = null;
let AUTH = {required:false,config:null,session:null,user:null,token:""};
let SYNC_READY = false, SYNC_PAUSED = false, fullSyncDirty = false, starsDirty = false, sessionDirty = false, syncTimer = null;
let dirtyProgress = new Set();
const REDUCE_DATA = !!(navigator.connection?.saveData || window.matchMedia?.("(prefers-reduced-data: reduce)")?.matches);
const $ = (s,r=document)=>r.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;if(t==="button")e.type="button";return e;};
function sectionTitle(view,id,text){ const h=el("h2","sr-only",text); h.id=id; view.append(h); }

/* ---------- local storage (IndexedDB first, localStorage fallback) ---------- */
async function openDb(){
  if(!("indexedDB" in window))throw new Error("IndexedDB unavailable");
  if(DB_PROMISE)return DB_PROMISE;
  DB_PROMISE=new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=()=>req.result.createObjectStore(DB_STORE);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error||new Error("IndexedDB open failed"));
  });
  return DB_PROMISE;
}
async function idbGet(key){
  const db=await openDb();
  return new Promise((resolve,reject)=>{
    const req=db.transaction(DB_STORE,"readonly").objectStore(DB_STORE).get(key);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function idbSet(key,value){
  const db=await openDb();
  return new Promise((resolve,reject)=>{
    const req=db.transaction(DB_STORE,"readwrite").objectStore(DB_STORE).put(value,key);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
async function idbDel(key){
  const db=await openDb();
  return new Promise((resolve,reject)=>{
    const req=db.transaction(DB_STORE,"readwrite").objectStore(DB_STORE).delete(key);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
async function readLocal(key,fallback){
  try{
    const value=await idbGet(key);
    if(value!==undefined)return value;
  }catch(e){}
  try{
    const raw=localStorage.getItem(key);
    if(raw!=null){
      const value=JSON.parse(raw);
      idbSet(key,value).catch(()=>{});
      return value;
    }
  }catch(e){}
  return fallback;
}
function requestPersistentStorage(){
  if(persistAsked||!navigator.storage?.persist||!navigator.storage?.persisted)return;
  persistAsked=true;
  navigator.storage.persisted().then(ok=>ok||navigator.storage.persist()).then(ok=>{
    if(ok)toast("השמירה המקומית קיבלה הגנה משופרת");
  }).catch(()=>{});
}
function saveLocal(key,value){
  requestPersistentStorage();
  idbSet(key,value).catch(()=>{
    try{localStorage.setItem(key,JSON.stringify(value));}
    catch(e){ if(!storageWarned){storageWarned=true;toast("לא ניתן לשמור נתונים בדפדפן");} }
  });
}
function userKey(key){ return AUTH.user?.id ? `${key}:${AUTH.user.id}` : key; }
async function readUserLocal(key,fallback){
  const scoped=await readLocal(userKey(key),undefined);
  if(scoped!==undefined)return scoped;
  if(AUTH.user?.id){
    const legacy=await readLocal(key,undefined);
    if(legacy!==undefined){
      saveLocal(userKey(key),legacy);
      return legacy;
    }
  }
  return fallback;
}
function saveUserLocal(key,value){ saveLocal(userKey(key),value); }
async function delUserLocal(key){
  idbDel(userKey(key)).catch(()=>{});
  try{localStorage.removeItem(userKey(key));}catch(e){}
}

/* ---------- Supabase progress sync ---------- */
function recordPayload(value){
  return value&&typeof value==="object"&&!Array.isArray(value)?value:{};
}
function mergeProgressRecord(local={},cloud={}){
  return {
    box:Math.max(Number(local.box)||0,Number(cloud.box)||0),
    seen:Math.max(Number(local.seen)||0,Number(cloud.seen)||0),
    correct:Math.max(Number(local.correct)||0,Number(cloud.correct)||0),
    wrong:Math.max(Number(local.wrong)||0,Number(cloud.wrong)||0),
    due:[Number(local.due)||0,Number(cloud.due)||0].filter(Boolean).sort((a,b)=>a-b)[0]||0,
    last:Math.max(Number(local.last)||0,Number(cloud.last)||0)
  };
}
function validSessionPayload(value){
  return value&&Array.isArray(value.queue)&&value.queue.length ? value : null;
}
function markCloudDirty({progressId=null,stars=false,session=false,full=false}={}){
  if(SYNC_PAUSED)return;
  if(progressId)dirtyProgress.add(progressId);
  if(stars)starsDirty=true;
  if(session)sessionDirty=true;
  if(full)fullSyncDirty=true;
  scheduleCloudSync();
}
function scheduleCloudSync(){
  if(!AUTH.required||!AUTH.user||!SYNC_READY)return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>pushCloudChanges().catch(()=>toast("סנכרון ענן נכשל")),1400);
}
async function pullCloudState(){
  if(!AUTH.user)return null;
  const uid=encodeURIComponent(AUTH.user.id);
  const [pRes,sRes,sessionRes]=await Promise.all([
    supabaseRest(`study_progress?select=question_id,payload,updated_at&user_id=eq.${uid}`),
    supabaseRest(`study_stars?select=question_id,updated_at&user_id=eq.${uid}`),
    supabaseRest(`study_sessions?select=payload,updated_at&user_id=eq.${uid}&limit=1`)
  ]);
  if(!pRes.ok||!sRes.ok||!sessionRes.ok)throw new Error("cloud pull failed");
  return {
    progress:await pRes.json(),
    stars:await sRes.json(),
    sessions:await sessionRes.json()
  };
}
async function mergeCloudState(){
  if(!AUTH.user)return;
  SYNC_PAUSED=true;
  try{
    const cloud=await pullCloudState();
    const cloudProgress={};
    (Array.isArray(cloud.progress)?cloud.progress:[]).forEach(row=>{
      if(QMAP.has(row.question_id))cloudProgress[row.question_id]=recordPayload(row.payload);
    });
    const merged={...PROG};
    Object.keys(cloudProgress).forEach(id=>{ merged[id]=mergeProgressRecord(merged[id],cloudProgress[id]); });
    Object.keys(PROG).forEach(id=>{ merged[id]=mergeProgressRecord(PROG[id],cloudProgress[id]); });
    PROG=merged;
    const cloudStars=new Set((Array.isArray(cloud.stars)?cloud.stars:[]).map(row=>row.question_id).filter(id=>QMAP.has(id)));
    STARS=new Set([...STARS,...cloudStars]);
    const cloudSession=validSessionPayload(cloud.sessions?.[0]?.payload);
    const cloudSessionMs=cloudSession?Math.max(Number(cloudSession.updatedAt)||0,Date.parse(cloud.sessions?.[0]?.updated_at||"")||0):0;
    const localSessionMs=session?Number(session.updatedAt||session.startedAt)||0:0;
    if(cloudSession&&(!session||cloudSessionMs>localSessionMs)){
      session=cloudSession;
    }
    saveUserLocal(PROG_KEY,PROG);
    saveUserLocal(STAR_KEY,[...STARS]);
    if(session)saveUserLocal(SESSION_KEY,session);
  }finally{
    SYNC_PAUSED=false;
  }
  SYNC_READY=true;
  markCloudDirty({full:true});
}
async function pushJsonRows(path,rows,onConflict){
  if(!rows.length)return;
  const res=await supabaseRest(`${path}?on_conflict=${onConflict}`,{
    method:"POST",
    headers:{"Prefer":"resolution=merge-duplicates,return=minimal"},
    body:JSON.stringify(rows)
  });
  if(!res.ok)throw new Error(`${path} upsert failed`);
}
async function deleteUserRows(path){
  const res=await supabaseRest(`${path}?user_id=eq.${encodeURIComponent(AUTH.user.id)}`,{method:"DELETE"});
  if(!res.ok)throw new Error(`${path} delete failed`);
}
async function pushCloudChanges(){
  if(!AUTH.user||!SYNC_READY)return;
  const uid=AUTH.user.id;
  const progressIds=fullSyncDirty?Object.keys(PROG):[...dirtyProgress];
  if(fullSyncDirty){
    await Promise.all([deleteUserRows("study_progress"),deleteUserRows("study_stars"),deleteUserRows("study_sessions")]);
  }
  if(progressIds.length){
    await pushJsonRows("study_progress",progressIds.filter(id=>QMAP.has(id)&&PROG[id]).map(id=>({
      user_id:uid,question_id:id,payload:PROG[id],updated_at:new Date().toISOString()
    })),"user_id,question_id");
  }
  if(fullSyncDirty||starsDirty){
    if(!fullSyncDirty)await deleteUserRows("study_stars");
    await pushJsonRows("study_stars",[...STARS].filter(id=>QMAP.has(id)).map(id=>({
      user_id:uid,question_id:id,updated_at:new Date().toISOString()
    })),"user_id,question_id");
  }
  if(fullSyncDirty||sessionDirty){
    await deleteUserRows("study_sessions");
    if(session&&session.i<session.queue.length){
      await pushJsonRows("study_sessions",[{user_id:uid,payload:session,updated_at:new Date().toISOString()}],"user_id");
    }
  }
  dirtyProgress.clear(); fullSyncDirty=false; starsDirty=false; sessionDirty=false;
}

/* ---------- authentication ---------- */
function storedSupabaseSession(){
  try{
    const value=JSON.parse(localStorage.getItem(SUPABASE_SESSION_KEY)||"null");
    if(!value?.access_token||!value?.refresh_token)return null;
    return value;
  }catch(e){return null;}
}
function saveSupabaseSession(value){
  AUTH.session=value;
  AUTH.token=value?.access_token||"";
  AUTH.user=value?.user||AUTH.user||null;
  try{localStorage.setItem(SUPABASE_SESSION_KEY,JSON.stringify(value));}
  catch(e){}
}
function clearAuth(){
  AUTH={required:AUTH.required,config:AUTH.config,session:null,user:null,token:""};
  SYNC_READY=false; dirtyProgress=new Set(); fullSyncDirty=false; starsDirty=false; sessionDirty=false;
  try{localStorage.removeItem(SUPABASE_SESSION_KEY);}catch(e){}
}
function authRequiredStored(){
  try{return localStorage.getItem(AUTH_REQUIRED_KEY)==="1";}
  catch(e){return false;}
}
function storeAuthRequired(required){
  try{
    if(required)localStorage.setItem(AUTH_REQUIRED_KEY,"1");
    else localStorage.removeItem(AUTH_REQUIRED_KEY);
  }catch(e){}
}
function authHeaders(extra={}){
  const headers={...extra};
  if(AUTH.token)headers.Authorization=`Bearer ${AUTH.token}`;
  return headers;
}
function authFetch(path,opts={}){
  return fetch(path,{...opts,headers:authHeaders(opts.headers||{})});
}
function dataFetch(path,opts={}){
  // On the auth-enabled (Netlify) deploy, hit the protected-asset function directly with
  // ?path= — the netlify.toml rewrite does not forward the query to the v2 function.
  // On GitHub Pages (AUTH.required=false) this is a plain static fetch (no change).
  if(AUTH.required && /^(data|docs)\//.test(path)){
    return authFetch(`/api/protected-asset?path=${encodeURIComponent(path)}`,opts);
  }
  return authFetch(path,opts);
}
function supabaseBase(path){
  return `${AUTH.config.url}${path}`;
}
function normalizeSupabaseSession(payload){
  const src=payload?.session||payload||{};
  if(!src.access_token||!src.refresh_token)return null;
  const expiresAt=Number(src.expires_at)||Math.floor(Date.now()/1000)+(Number(src.expires_in)||3600);
  return {
    access_token:src.access_token,
    refresh_token:src.refresh_token,
    expires_at:expiresAt,
    token_type:src.token_type||"bearer",
    user:payload?.user||src.user||AUTH.user||null
  };
}
async function supabaseAuthRequest(path,opts={}){
  const headers={"apikey":AUTH.config.key,"Content-Type":"application/json",...(opts.headers||{})};
  if(opts.auth!==false&&AUTH.token)headers.Authorization=`Bearer ${AUTH.token}`;
  return fetch(supabaseBase(path),{...opts,headers});
}
async function supabaseRest(path,opts={}){
  const headers={
    "apikey":AUTH.config.key,
    "Authorization":`Bearer ${AUTH.token}`,
    "Content-Type":"application/json",
    ...(opts.headers||{})
  };
  return fetch(supabaseBase(`/rest/v1/${path}`),{...opts,headers});
}
async function refreshSupabaseSession(){
  if(!AUTH.config||!AUTH.session?.refresh_token)return false;
  const res=await supabaseAuthRequest("/auth/v1/token?grant_type=refresh_token",{
    method:"POST",auth:false,body:JSON.stringify({refresh_token:AUTH.session.refresh_token})
  });
  if(!res.ok)return false;
  const session=normalizeSupabaseSession(await res.json().catch(()=>({})));
  if(!session)return false;
  saveSupabaseSession(session);
  return true;
}
async function verifySupabaseSession(){
  if(!AUTH.config||!AUTH.session)return false;
  if((Number(AUTH.session.expires_at)||0)-60<=Math.floor(Date.now()/1000)){
    if(!(await refreshSupabaseSession()))return false;
  }
  const res=await supabaseAuthRequest("/auth/v1/user",{method:"GET"});
  if(!res.ok)return false;
  const user=await res.json().catch(()=>null);
  if(!user?.id)return false;
  AUTH.user=user;
  saveSupabaseSession({...AUTH.session,user});
  return true;
}
function setAuthChrome(){
  const locked=AUTH.required&&!AUTH.user;
  document.querySelector("nav.bar")?.classList.toggle("hidden",locked);
  const out=$("#auth-logout");
  if(out){
    out.classList.toggle("hidden",!AUTH.required||!AUTH.user);
    out.onclick=()=>logout();
  }
}
async function initAuth(){
  const remembered=authRequiredStored();
  // Static-only hosts have no Netlify Functions, so auth is impossible there.
  // Skip the /api probe to avoid noisy 404s and keep the public/offline bank open.
  if(!shouldProbeAuthConfig()){
    AUTH.required=false;
    storeAuthRequired(false);
    setAuthChrome();
    return true;
  }
  try{
    const res=await fetch("/api/supabase-config",{cache:"no-store",headers:{"Accept":"application/json"}});
    if(res.ok){
      const data=await res.json().catch(()=>({}));
      AUTH.required=!!data.enabled;
      AUTH.config=AUTH.required?{url:String(data.url||"").replace(/\/+$/,""),key:String(data.key||"")}:null;
      storeAuthRequired(AUTH.required);
    }else{
      AUTH.required=remembered;
    }
  }catch(e){
    AUTH.required=remembered;
  }
  if(!AUTH.required){setAuthChrome();return true;}
  if(!AUTH.config){setAuthChrome();return false;}
  const saved=storedSupabaseSession();
  if(!saved){setAuthChrome();return false;}
  saveSupabaseSession(saved);
  try{ if(await verifySupabaseSession()){setAuthChrome();return true;} }
  catch(e){}
  clearAuth();
  setAuthChrome();
  return false;
}
function renderLogin(message=""){
  stopTimer();
  session=null;
  ["quiz","browse","stats"].forEach(x=>$("#view-"+x).classList.add("hidden"));
  const v=$("#view-home");
  v.classList.remove("hidden");
  v.setAttribute("aria-labelledby","auth-title");
  v.innerHTML="";
  sectionTitle(v,"auth-title","כניסה");
  const card=el("div","card auth-card");
  card.innerHTML=`
    <div class="qhead"><div><b>כניסה לחשבון</b><div class="muted small">הזן אימייל וסיסמה כדי לפתוח את בנק השאלות ולסנכרן התקדמות.</div></div></div>
    <form class="auth-form" id="auth-form">
      <div class="field">
        <label for="auth-email">אימייל</label>
        <input class="input" id="auth-email" name="email" type="email" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="auth-password">סיסמה</label>
        <input class="input" id="auth-password" name="password" type="password" autocomplete="current-password" minlength="6" required />
      </div>
      <div class="grid g2">
        <button type="submit" class="btn primary" data-auth-action="login">כניסה</button>
        <button type="submit" class="btn" data-auth-action="signup">הרשמה</button>
      </div>
      <div class="auth-msg" id="auth-message" role="status" aria-live="polite">${escapeHtml(message)}</div>
    </form>`;
  v.append(card);
  setAuthChrome();
  const form=$("#auth-form");
  const msg=$("#auth-message");

/* ---------- progress (Leitner spaced repetition) ---------- */
async function loadProg(){ PROG=await readUserLocal(PROG_KEY,{})||{}; }
function saveProg(changedId=null){ saveUserLocal(PROG_KEY,PROG); markCloudDirty(changedId?{progressId:changedId}:{full:true}); }
async function loadStars(){ STARS=new Set(await readUserLocal(STAR_KEY,[])||[]); }
function saveStars(){ saveUserLocal(STAR_KEY,[...STARS]); markCloudDirty({stars:true}); }
const BOX_DAYS=[0,1,3,7,16,40];
function rec(id){ return PROG[id]||(PROG[id]={box:0,seen:0,correct:0,wrong:0,due:0,last:0,lastWrong:0}); }
function grade(id,ok){
  if(isAiId(id))return; // AI practice questions never enter the official progress/Leitner/cloud sync
  const r=rec(id), now=Date.now(); r.seen++; r.last=now;
  if(ok){ r.correct++; r.box=Math.min(r.box+1,5); }
  else { r.wrong++; r.lastWrong=now; r.box=Math.max(r.box-1,0); }
  r.due = now+BOX_DAYS[r.box]*864e5;
  saveProg(id);
}
const isDue = id => { const r=PROG[id]; return !r || r.seen===0 || (r.due||0)<=Date.now(); };
const isSeen = id => { const r=PROG[id]; return r && r.seen>0; };
const isWrongPile = id => { const r=PROG[id]; return r && r.wrong>0 && r.box<=1; };
function progressAttempts(r){ return (r?.correct||0)+(r?.wrong||0); }
function progressAccuracy(r){ const total=progressAttempts(r); return total?Math.round((r.correct||0)/total*100):null; }
function dueTodayQuestionIds(){ return QUESTIONS.filter(q=>isSeen(q.id)&&isDue(q.id)).map(q=>q.id); }
function recentMistakeIds(limit=40){
  return QUESTIONS.map(q=>({q,r:PROG[q.id]||{}}))
    .filter(({r})=>(r.wrong||0)>0)
    .sort((a,b)=>((b.r.lastWrong||b.r.last||0)-(a.r.lastWrong||a.r.last||0))||((b.r.wrong||0)-(a.r.wrong||0)))
    .slice(0,limit).map(({q})=>q.id);
}
function highYieldQuestionIds(limit=80){
  return QUESTIONS.map(q=>{
    const r=PROG[q.id]||{};
    let score=0;
    if(isSeen(q.id)&&isDue(q.id))score+=60;
    if(isWrongPile(q.id))score+=45+(r.wrong||0)*4;
    if(STARS.has(q.id))score+=30;
    const acc=progressAccuracy(r);
    if(acc!==null&&acc<70)score+=20+(70-acc);
    return {id:q.id,score,last:r.last||0};
  }).filter(row=>row.score>0)
    .sort((a,b)=>(b.score-a.score)||(b.last-a.last))
    .slice(0,limit).map(row=>row.id);
}
function topicStatsRows(){
  const rows=new Map();
  QUESTIONS.forEach(q=>{
    const r=PROG[q.id]||{};
    const row=rows.get(q.ti)||{ti:q.ti,topic:TOPICS[q.ti]||"",count:0,seen:0,correct:0,wrong:0,total:0,due:0,starred:0,last:0};
    row.count++;
    if(STARS.has(q.id))row.starred++;
    if(isSeen(q.id)){
      row.seen++;
      row.correct+=r.correct||0;
      row.wrong+=r.wrong||0;
      row.total+=progressAttempts(r);
      row.last=Math.max(row.last,r.last||0);
      if(isDue(q.id))row.due++;
    }
    rows.set(q.ti,row);
  });
  return [...rows.values()].map(row=>{
    const accuracy=row.total?Math.round(row.correct/row.total*100):null;
    const weakScore=(accuracy===null?101:100-accuracy)+(row.due*1.5)+(row.wrong*2);
    return {...row,accuracy,weakScore};
  });
}
function weakestStudyTopic(){
  const attempted=topicStatsRows().filter(row=>row.total>0);
  if(attempted.length)return attempted.sort((a,b)=>(b.weakScore-a.weakScore)||(b.total-a.total))[0];
  return topicStatsRows().sort((a,b)=>b.count-a.count)[0]||null;
}
function weakTopicDrillIds(limit=60){
  const target=weakestStudyTopic();
  if(!target)return [];
  return QUESTIONS.filter(q=>q.ti===target.ti)
    .map(q=>{
      const r=PROG[q.id]||{};
      let score=0;
      if(isWrongPile(q.id))score+=70;
      if(isSeen(q.id)&&isDue(q.id))score+=50;
      if(!isSeen(q.id))score+=20;
      if(STARS.has(q.id))score+=12;
      score+=(r.wrong||0)*4;
      return {id:q.id,score,last:r.last||0};
    })
    .sort((a,b)=>(b.score-a.score)||(a.last-b.last))
    .slice(0,limit).map(row=>row.id);
}
function shortDate(ms){
  if(!ms)return "טרם נלמד";
  try{return new Intl.DateTimeFormat("he-IL",{day:"2-digit",month:"2-digit"}).format(new Date(ms));}
  catch(e){return new Date(ms).toLocaleDateString();}
}
function toggleStar(id, after){
  if(STARS.has(id))STARS.delete(id);else STARS.add(id);
  saveStars();
  toast(STARS.has(id)?"נשמר לשאלות שמורות":"הוסר מהשמורות");
  if(after)after();
}
function starButton(id, after){
  const on=STARS.has(id);
  const b=el("button","iconbtn"+(on?" on":""),on?"★":"☆");
  b.setAttribute("aria-label",on?"הסר מהשאלות השמורות":"שמור שאלה");
  b.setAttribute("aria-pressed",on?"true":"false");
  b.onclick=()=>toggleStar(id,after);
  return b;
}

async function boot(){

async function loadAppData(){
  await loadProg();
  await loadStars();
  try{
    // Guard the protected-asset reads: a stale token can return 401 with a JSON error
    // envelope that r.json() would happily parse, leaving QUESTIONS={error:...} and
    // throwing later on .map(). Mirror the already-guarded answer_key_doubts line.
    const [q,t,doubts,syl,prac]=await Promise.all([
      dataFetch("data/questions.json").then(r=>r.ok?r.json():Promise.reject(dataLoadError(r,"בנק השאלות"))),
      fetch("data/topics.json").then(r=>r.ok?r.json():Promise.reject(dataLoadError(r,"רשימת הנושאים"))),
      dataFetch("docs/answer_key_doubts.json").then(r=>r.ok?r.json():[]).catch(()=>[]),
      fetch("data/syllabus.json").then(r=>r.ok?r.json():null).catch(()=>null),
      fetch("data/practice_questions.json").then(r=>r.ok?r.json():[]).catch(()=>[])
    ]);
    QUESTIONS=q; TOPICS=t.topics||[]; SYLLABUS=syl; PRACTICE=Array.isArray(prac)?prac:[];
    QMAP=new Map(QUESTIONS.map(q=>[q.id,q]));
    // Tag the AI pool with a synthetic sitting + flag, then index it separately from the bank.
    PRACTICE.forEach(p=>{ p.t="AI"; p.ai_generated=true; });
    AIMAP=new Map(PRACTICE.map(p=>[p.id,p]));
    KEY_DOUBTS=Object.fromEntries((Array.isArray(doubts)?doubts:[]).map(d=>[d.id,d]));
    session=await loadSavedSession();
    await mergeCloudState().catch(()=>toast("לא ניתן לסנכרן התקדמות ענן כרגע"));
    // Explanations are optional + larger; respect reduced-data by loading only on demand.
    if(!REDUCE_DATA) loadExplanations();
  }catch(e){
    // A 401 on a protected asset means the stored token went stale between
    // session-restore and data-load. Clear the dead session and route back to
    // the existing login screen instead of the generic dead-end error card.
    if(e&&e.authExpired){
      clearAuth();
      setAuthChrome();
      renderLogin("פג תוקף ההתחברות. התחבר שוב כדי לפתוח את בנק השאלות.");
      return;
    }
    renderStartupError(e);
    return;
  }
  $("#view-home").setAttribute("aria-labelledby","home-title");
  renderHome();
}
// Build a load error for a non-OK protected/static asset response. 401 is tagged
// authExpired so loadAppData can route to the login screen; other codes surface a
// specific Hebrew message with the HTTP status (matching the askAi/generateAiQuestion style).
function dataLoadError(res,label){
  const err=new Error(res.status===401
    ? `${label}: פג תוקף ההתחברות (401)`
    : `${label}: לא ניתן לטעון (${res.status})`);
  if(res.status===401)err.authExpired=true;
  err.status=res.status;
  return err;
}
function loadExplanations(){
  if(Object.keys(EXP).length)return Promise.resolve(EXP);
  if(!EXP_PROMISE){
    EXP_PROMISE = dataFetch("data/explanations.json").then(r=>r.ok?r.json():{}).then(e=>{EXP=e||{};return EXP;}).catch(()=>({}));
  }
  return EXP_PROMISE;
}
function clearProtectedAppCache(){
  try{navigator.serviceWorker.controller?.postMessage({type:"CLEAR_PROTECTED_CACHE"});}catch(e){}
}
function renderStartupError(error){

/* ---------- helpers ---------- */
const byYear = ()=>{const m={};QUESTIONS.forEach(q=>m[q.t]=(m[q.t]||0)+1);return m;};
const byTopic= ()=>{const m={};QUESTIONS.forEach(q=>m[q.ti]=(m[q.ti]||0)+1);return m;};
function yearLabel(t){if(t==="AI"||!t)return "AI · Synopsis";return t.replace("-Jun"," · יוני").replace("-Sep"," · ספטמבר").replace("-May"," · מאי");}
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600);}
function acceptedIndices(q){ return q.all_accepted ? [0,1,2,3] : (q.c_accept&&q.c_accept.length?q.c_accept:[q.c]); }
function normText(s){return String(s||"").normalize("NFKC").replace(/[\u0591-\u05C7]/g,"").toLowerCase();}
function qById(id){return QMAP.get(id)||AIMAP.get(id);}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function escapeRegExp(s){return String(s).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}
function stripPdfTailArtifacts(s){
  return String(s||"").replace(/\s*יש לבחור בתשובה אחת בלבד עבור כל שאלה(?:\s*עמוד)?\s*\d+\s*$/i,"").trim();
}
function readableMixedText(s){
  return escapeHtml(stripPdfTailArtifacts(s)
    .replace(/([\u0590-\u05ff])([A-Za-z0-9])/g,"$1 $2")
    .replace(/([A-Za-z0-9])([\u0590-\u05ff])/g,"$1 $2")
    .replace(/\s+([,.;:?!])/g,"$1")
    .replace(/([,;:?!])(?=[\u0590-\u05ffA-Za-z])/g,"$1 ")
    .replace(/(^|[^\d])\.(?=[\u0590-\u05ffA-Za-z])/g,"$1. "));
}
function highlight(s,term){
  const safe=escapeHtml(s);
  const raw=term.trim();
  if(!raw)return safe;
  const needle=escapeRegExp(escapeHtml(raw));
  return safe.replace(new RegExp(needle,"gi"),m=>`<mark class="hl">${m}</mark>`);
}
function highlightReadable(s,term){
  const safe=readableMixedText(s);
  const raw=term.trim();
  if(!raw)return safe;
  const needle=escapeRegExp(escapeHtml(raw));
  return safe.replace(new RegExp(needle,"gi"),m=>`<mark class="hl">${m}</mark>`);
}
function timerText(sec){
  sec=Math.max(0,Math.floor(sec));
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  return h?`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`:`${m}:${String(s).padStart(2,"0")}`;
}

/* ---------- session persistence ---------- */
async function loadSavedSession(){
  try{
    const s=await readUserLocal(SESSION_KEY,null);
    if(!s||!Array.isArray(s.queue)||!s.queue.length)return null;
    s.queue=s.queue.filter(id=>QMAP.has(id));
    if(!s.queue.length)return null;
    s.i=Math.max(0,Math.min(Number(s.i)||0,s.queue.length));
    if(s.i>=s.queue.length)return null;
    s.correct=Number(s.correct)||0;
    s.wrong=Number(s.wrong)||0;
    s.title=String(s.title||"תרגול");
    s.mode=s.mode==="exam"?"exam":"practice";
    s.answers=Array.isArray(s.answers)?s.answers.filter(a=>a&&QMAP.has(a.id)):[];
    if(s.answered && (!s.lastAnswer||s.lastAnswer.id!==s.queue[s.i])){s.answered=false;s.lastAnswer=null;}
    return s;
  }catch(e){return null;}
}
function saveSession(){
  if(!session||session.i>=session.queue.length){clearSavedSession();return;}
  session.updatedAt=Date.now();
  saveUserLocal(SESSION_KEY,session);
  markCloudDirty({session:true});
}
function clearSavedSession(){
  delUserLocal(SESSION_KEY);
  markCloudDirty({session:true});
}

function weakestTopicIndex(tps){
  const scored=Object.keys(tps).map(Number).map(ti=>{
    let wrong=0,total=0;
    QUESTIONS.forEach(q=>{
      if(q.ti!==ti)return;
      const r=PROG[q.id];
      if(!r)return;
      wrong+=r.wrong||0;
      total+=(r.correct||0)+(r.wrong||0);
    });
    return {ti,score:total?wrong/total:0,count:tps[ti]||0};
  }).sort((a,b)=>(b.score-a.score)||(b.count-a.count));
  return scored[0]?.ti ?? 0;
}

// Draw a pre-generated practice question from the offline pool (data/practice_questions.json).
// Reuses the AI-question render/grade path, so practice questions stay isolated from the
// verified 900-question bank's progress/Leitner state and inherit the AI labeling.
function drawPracticeQuestion(card){
  const out=card.querySelector(".ai-drill-output");
  if(!Array.isArray(PRACTICE)||!PRACTICE.length){ if(out)out.textContent="מאגר התרגול אינו זמין כרגע."; return; }
  const topicSel=card.querySelector("#ai-topic");
  const topicIndex=topicSel?Number(topicSel.value):NaN;
  const chapterSel=card.querySelector("#ai-chapter");
  const chapter=chapterSel?chapterSel.value:"";
  let note="";
  // Narrow by chapter first, then topic, then fall back to the whole pool — always serve a question.
  let pool=PRACTICE;
  if(chapter){ const byCh=pool.filter(p=>p.chapter===chapter); if(byCh.length)pool=byCh; else note="אין שאלות מאגר לפרק זה — נבחרה שאלה קרובה."; }
  if(Number.isInteger(topicIndex)){
    const byTopic=pool.filter(p=>Number(p.ti)===topicIndex);
    if(byTopic.length)pool=byTopic;
    else if(!note)note="אין שאלות מאגר לנושא זה — נבחרה שאלה קרובה.";
  }
  if(!pool.length)pool=PRACTICE;
  const q=pool[Math.floor(Math.random()*pool.length)];
  const label=q.ref||"Kaplan & Sadock Synopsis";
  renderGeneratedAiQuestion(out,{
    stem:q.q,
    options:Array.isArray(q.o)?q.o:[],
    correctIndex:Number(q.c),
    explanation:q.explanation||"",
    topic:(typeof TOPICS!=="undefined"&&TOPICS[q.ti])?TOPICS[q.ti]:(q.chapter||""),
    sourceLabel:label,
    citations:[label],
    sourceContract:{
      sourceLabel:label,
      scope:q.chapter?`פרק סילבוס: ${q.chapter}`:"שאלת תרגול מבוססת Synopsis.",
      limit:"מאגר תרגול AI; לא חלק מבנק 900 השאלות המאומתות."
    },
    qualityWarnings:note?[note]:[]
  });
}
// Start a full practice round over the AI pool, scoped by the card's topic/chapter selectors.
// Runs as a normal quiz session, but AI ids never enter PROG (grade() guards on isAiId), so
// these rounds are ephemeral and never touch the verified-bank progress/Leitner/stats.
function startAiSession(card){
  if(!Array.isArray(PRACTICE)||!PRACTICE.length){toast("מאגר התרגול אינו זמין");return;}
  const topicSel=card&&card.querySelector("#ai-topic");
  const topicIndex=topicSel?Number(topicSel.value):NaN;
  const chapterSel=card&&card.querySelector("#ai-chapter");
  const chapter=chapterSel?chapterSel.value:"";
  let pool=PRACTICE, scope="כל המאגר";
  if(chapter){ const byCh=pool.filter(p=>p.chapter===chapter); if(byCh.length){pool=byCh;scope=chapter;} }
  if(Number.isInteger(topicIndex)){ const byT=pool.filter(p=>Number(p.ti)===topicIndex); if(byT.length){pool=byT;scope=TOPICS[topicIndex]||scope;} }
  const ids=pool.map(p=>p.id);
  if(!ids.length){toast("אין שאלות מאגר לסינון זה");return;}
  startSession(ids,`תרגול AI · ${scope}`,true,{mode:"practice",source:"ai-pool"});
}
async function generateAiQuestion(card){
  const out=card.querySelector(".ai-drill-output");
  const topicIndex=Number(card.querySelector("#ai-topic").value);
  const source=card.querySelector("#ai-source").value;
  const level=card.querySelector("#ai-level").value;
  const chapterSel=card.querySelector("#ai-chapter");
  const chapter=chapterSel?chapterSel.value:"";
  out.textContent="יוצר שאלת AI...";
  try{
    const res=await authFetch("/api/ai-question",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      topic:TOPICS[topicIndex]||"Other / General",
      topicIndex,
      source,
      sourceLabel:aiSourceLabel(source),
      chapter,
      level,
      progressSummary:progressSummary()
    })});
    const data=await res.json().catch(()=>({}));
    if(!res.ok){
      out.textContent=res.status===401?"יש להתחבר כדי ליצור שאלות AI.":[404,405,501].includes(res.status)?"שאלות AI זמינות בפריסת Netlify המחוברת.":(data.error||`שגיאת AI (${res.status}).`);
      return;
    }
    renderGeneratedAiQuestion(out,data.question||data);
  }catch(e){
    out.textContent="יצירת שאלת AI אינה זמינה כרגע. בנק השאלות המאומת ממשיך לעבוד כרגיל.";
  }
}
function renderGeneratedAiQuestion(out,q){
  const opts=Array.isArray(q?.options)?q.options.slice(0,4):[];
  const correct=Number.isInteger(q?.correctIndex)?q.correctIndex:-1;
  if(!q?.stem||opts.length!==4||correct<0||correct>3){
    out.textContent="המודל החזיר שאלה לא תקינה. נסה שוב.";
    return;
  }
  AI_LAST=q;
  try{localStorage.setItem("psy_ai_last",JSON.stringify(q));}catch(e){}
  out.__aiQuestion=q;
  out.dataset.correctIndex=String(correct);
  const citations=Array.isArray(q.citations)?q.citations.filter(Boolean).slice(0,4):[];
  out.innerHTML=`<div class="ai-question">
    <div class="ai-q-meta"><span class="tag acc">AI</span><span class="tag">${readableMixedText(q.topic||"")}</span><span class="tag" dir="ltr">${escapeHtml(q.sourceLabel||"Syllabus")}</span></div>
    ${aiSourceContractHtml(q)}
    ${aiQualityWarningsHtml(q.qualityWarnings)}
    <div class="qtext">${readableMixedText(q.stem)}</div>
    <div class="opts">${opts.map((opt,k)=>`<button type="button" class="opt ai-q-option" data-ai-q-option="${k}" aria-label="אפשרות ${LETTERS[k]}: ${escapeHtml(opt)}"><span class="k">${LETTERS[k]}</span><span class="ot">${readableMixedText(opt)}</span></button>`).join("")}</div>
    <div class="ai-q-feedback" role="status" aria-live="polite"></div>
    ${citations.length?`<div class="ai-citations"><span>מקורות:</span>${citations.map(c=>`<span>${readableMixedText(c)}</span>`).join("")}</div>`:""}
    <div class="ai-generated-note">שאלה זו נוצרה לתרגול בלבד ואינה חלק מהמפתח הרשמי.</div>
  </div>`;
  out.querySelectorAll("[data-ai-q-option]").forEach(b=>b.onclick=()=>gradeGeneratedAiQuestion(out,Number(b.dataset.aiQOption)));
}
function aiSourceContractHtml(q){
  const contract=q?.sourceContract||{};
  const label=contract.sourceLabel||q?.sourceLabel||"Syllabus";
  const scope=contract.scope||"שאלה מקורית לפי מקור הסילבוס שנבחר.";
  const limit=contract.limit||"תרגול AI בלבד; לא חלק מבנק 900 השאלות המאומתות.";
  return `<div class="ai-source-contract" aria-label="מסגרת מקור לשאלת AI"><b>מקור נבחר</b><span dir="ltr">${escapeHtml(label)}</span><span>${readableMixedText(scope)}</span><span>${readableMixedText(limit)}</span></div>`;
}
function aiQualityWarningsHtml(warnings){
  const items=Array.isArray(warnings)?warnings.filter(Boolean).slice(0,3):[];
  if(!items.length)return "";
  return `<div class="ai-quality-warnings" role="note"><b>בדיקת איכות</b>${items.map(w=>`<span>${readableMixedText(w)}</span>`).join("")}</div>`;
}
function gradeGeneratedAiQuestion(out,k){
  const q=out.__aiQuestion||{};
  const correct=Number(out.dataset.correctIndex);
  const buttons=[...out.querySelectorAll("[data-ai-q-option]")];
  buttons.forEach((b,i)=>{
    b.disabled=true;
    b.classList.toggle("correct",i===correct);
    b.classList.toggle("wrong",i===k&&k!==correct);
    b.classList.toggle("dim",i!==correct&&i!==k);
  });
  const fb=out.querySelector(".ai-q-feedback");
  const ok=k===correct;
  fb.innerHTML=`<b>${ok?"נכון":"לא נכון"}</b><div class="expl">${renderAiMarkdown(q.explanation||"")}</div>`;
}

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startSession(ids,title,doShuffle,opts={}){
  if(!ids.length){toast("אין שאלות");return;}
  let queue = (doShuffle ? shuffle(ids) : ids.slice()).filter(id=>QMAP.has(id)||AIMAP.has(id));
  if(!queue.length){toast("אין שאלות זמינות");return;}
  session={queue,i:0,correct:0,wrong:0,title,answered:false,lastAnswer:null,answers:[],
    mode:opts.mode||"practice",source:opts.source||"",reviewFirst:!!opts.reviewFirst,startedAt:Date.now(),updatedAt:Date.now(),durationSec:opts.durationSec||0};
  saveSession();
  go("quiz"); renderQuiz();
}
function startExam(t){
  const ids=QUESTIONS.filter(q=>q.t===t).map(q=>q.id);
  startSession(ids,"סימולציה · "+yearLabel(t),false,{mode:"exam",source:t,durationSec:ids.length*EXAM_SECONDS_PER_Q});
}
function reviewPrimerHtml(q){
  const exp=EXP[q.id];
  const body=exp?readableMixedText(exp):'<span class="muted">טוען הסבר מקומי לפני ניסיון חוזר...</span>';
  const ref=q.ref?`<div class="ref">מקור: <b>${readableMixedText(q.ref)}</b> · Kaplan &amp; Sadock Synopsis</div>`:"";
  return `<div class="expl-h">הסבר לפני ניסיון חוזר</div>${body}${ref}`;
}
function attachReviewPrimer(card,q){
  if(!session?.reviewFirst||session.answered)return;
  const primer=el("div","review-primer",reviewPrimerHtml(q));
  primer.setAttribute("role","note");
  card.append(primer);
  if(!EXP[q.id]){
    loadExplanations().then(()=>{
      if(primer.isConnected)primer.innerHTML=reviewPrimerHtml(q);
    });
  }
}
function renderQuiz(){

  const qhead=el("div","qhead",
    `<div class="qmeta"><span class="tag">${escapeHtml(session.title)}</span><span class="tag"${q.ai_generated?' style="color:var(--warn);border-color:var(--warn)" title="שאלת תרגול שנוצרה על-ידי AI ומבוססת על Synopsis — אינה חלק מבנק 900 השאלות הרשמי ואינה נספרת בנתונים"':''}>${escapeHtml(yearLabel(q.t))}</span><span class="tag acc">${escapeHtml(topicName(q))}</span>${q.vision?'<span class="tag" style="color:var(--warn);border-color:var(--warn)" title="תמלול אוטומטי מהמקור — ודא מול ה-PDF">OCR</span>':""}${doubt}</div>
     <div class="toolbar">${timer}<span class="qcount" dir="ltr">${session.i+1} / ${session.queue.length}</span></div>`);
  if(!q.ai_generated)qhead.querySelector(".toolbar").prepend(starButton(q.id,()=>renderQuiz()));
  card.append(qhead);
  const pb=el("div","progbar",`<i style="width:${pct}%"></i>`);pb.setAttribute("role","progressbar");pb.setAttribute("aria-label","התקדמות בסבב");pb.setAttribute("aria-valuemin","0");pb.setAttribute("aria-valuemax","100");pb.setAttribute("aria-valuenow",String(pct));card.append(pb);
  const qText=el("div","qtext",readableMixedText(q.q));qText.id="current-question";card.append(qText);
  attachReviewPrimer(card,q);
  const opts=el("div","opts");opts.setAttribute("role","group");opts.setAttribute("aria-labelledby","current-question");
  q.o.forEach((o,k)=>{
    const b=el("button","opt",`<span class="k">${LETTERS[k]}</span><span class="ot">${readableMixedText(o)}</span>`);
    b.setAttribute("aria-label",`אפשרות ${LETTERS[k]}: ${o}`);
    b.setAttribute("aria-keyshortcuts",String(k+1));
    b.onclick=()=>answer(q,k,opts,fb,card);
    opts.append(b);
  });
  card.append(opts);
  const fb=el("div","fb");fb.id="grading-feedback";fb.setAttribute("role","status");fb.setAttribute("aria-live","polite");fb.setAttribute("aria-atomic","true");fb.tabIndex=-1;card.append(fb);
  const foot=el("div","qfoot quiz-sticky-actions");
  if(session.mode==="exam"){
    // STRICT exam: record selection silently, allow navigation + answer changes, grade only on submit.
    const prevA=(session.answers||[]).find(a=>a.index===session.i);
    if(prevA&&Number.isInteger(prevA.k))opts.children[prevA.k]?.classList.add("sel");
    const answered=new Set((session.answers||[]).filter(a=>Number.isInteger(a.k)).map(a=>a.index)).size;
    const banner=el("div","exam-banner",`<span>נענו <b>${answered}</b> / ${session.queue.length}</span><span>במצב מבחן התשובות וההסברים מוצגים רק בהגשה</span>`);
    card.insertBefore(banner,opts);
    const isLast=session.i+1>=session.queue.length;
    const prev=el("button","btn","→ הקודם");prev.setAttribute("aria-label","שאלה קודמת");prev.disabled=session.i===0;prev.onclick=()=>prevQ();
    const next=el("button","btn examnext",isLast?"לסיום":"הבא ←");next.setAttribute("aria-label",isLast?"מעבר לסיום":"שאלה הבאה");next.setAttribute("aria-keyshortcuts","Enter");next.onclick=()=>{isLast?confirmSubmit():nextQ();};
    const sub=el("button","btn primary","סיום והגשה");sub.setAttribute("aria-label","סיום והגשת המבחן");sub.onclick=()=>confirmSubmit();

async function answer(q,k,opts,fb,card){
  if(session.mode==="exam"){selectExam(q,k,opts);return;}
  if(session.answered)return;
  showAnswer(q,k,opts,fb,card,true);
}
function selectExam(q,k,opts){
  [...opts.children].forEach((b,idx)=>b.classList.toggle("sel",idx===k));
  session.answers=(session.answers||[]).filter(a=>a.index!==session.i);
  session.answers.push({index:session.i,id:q.id,k,skipped:false,at:Date.now()});
  saveSession();
  const banner=$("#view-quiz .exam-banner b");
  if(banner)banner.textContent=String(new Set(session.answers.filter(a=>Number.isInteger(a.k)).map(a=>a.index)).size);
}
function prevQ(){
  if(!session||session.i<=0)return;
  session.i--;session.answered=false;session.lastAnswer=null;
  saveSession();renderQuiz();window.scrollTo({top:0,behavior:"auto"});
}
function confirmSubmit(){
  if(!session)return;
  const answered=new Set((session.answers||[]).filter(a=>Number.isInteger(a.k)).map(a=>a.index)).size;
  const un=session.queue.length-answered;
  if(un>0&&!confirm(`נותרו ${un} שאלות ללא מענה. להגיש את המבחן בכל זאת?`))return;
  submitExam();
}
function submitExam(){
  if(!session)return;
  stopTimer();
  const byIndex=new Map((session.answers||[]).map(a=>[a.index,a]));
  session.correct=0;session.wrong=0;
  const graded=[];
  session.queue.forEach((id,idx)=>{
    const q=qById(id);if(!q)return;
    const a=byIndex.get(idx);
    const k=a&&Number.isInteger(a.k)?a.k:null;
    const ok=k!=null&&acceptedIndices(q).includes(k);
    if(ok)session.correct++;else session.wrong++;
    grade(id,ok);
    graded.push({index:idx,id,k,ok,skipped:k==null,at:Date.now()});
  });
  session.answers=graded;
  session.i=session.queue.length;
  saveSession();
  renderSessionEnd();
}
function showAnswer(q,k,opts,fb,card,record){
  session.answered=true;
  const accept=acceptedIndices(q);
  const ok=accept.includes(k);
  [...opts.children].forEach((b,idx)=>{
    b.disabled=true;
    if(accept.includes(idx))b.classList.add("correct");
    else if(idx===k)b.classList.add("wrong");
    else b.classList.add("dim");
  });
  if(record){
    if(ok)session.correct++;else session.wrong++;
    session.lastAnswer={id:q.id,k,ok,at:Date.now()};
    session.answers=session.answers.filter(a=>!(a.index===session.i&&a.id===q.id));
    session.answers.push({index:session.i,id:q.id,k,ok,skipped:false,at:Date.now()});
    grade(q.id,ok);
    saveSession();
  }
  fb.className="fb show "+(ok?"ok":"no");
  fb.setAttribute("aria-live",ok?"polite":"assertive");
  let h = ok?"✅ נכון!":"❌ לא נכון";
  if(q.all_accepted) h+=' <span class="note">— כל התשובות התקבלו (שאלה שבוטלה לאחר ערעור)</span>';
  else if(accept.length>1) h+=` <span class="note">— מתקבלות גם: ${accept.map(i=>LETTERS[i]).join(", ")}</span>`;
  const exp=q.ai_generated?(q.explanation||""):EXP[q.id];
  if(exp) h+=`<div class="expl"><div class="expl-h">הסבר</div>${readableMixedText(exp)}</div>`;
  else if(q.ai_generated) {/* AI item without a stored explanation: nothing to lazy-load */}
  else if(REDUCE_DATA) h+=`<div class="expl"><div class="expl-h">הסבר</div><button type="button" class="btn" data-load-exp="${q.id}">טען הסבר</button></div>`;
  else h+=`<div class="expl" data-exp-slot="${q.id}"><div class="expl-h">הסבר</div><span class="muted">טוען הסבר...</span></div>`;
  if(q.ref) h+=`<div class="ref">מקור: <b>${readableMixedText(q.ref)}</b> · Kaplan &amp; Sadock Synopsis</div>`;
  if(q.vision) h+='<div class="note">⚠ נוסח השאלה תומלל אוטומטית (מועד 2025 פגום במקור) — התשובות, המפתח וההסבר מהימנים; ודא ניסוח מול ה-PDF</div>';
  const keyDoubt=KEY_DOUBTS[q.id];
  if(keyDoubt) h+=`<div class="note">⚑ דגל לימודי לגבי המפתח הרשמי: ${readableMixedText(keyDoubt.issue)} המפתח הרשמי נשמר ללא שינוי.</div>`;
  h+=aiTutorHtml();
  fb.innerHTML=h;
  const expSlot=fb.querySelector("[data-exp-slot]");
  if(expSlot){
    loadExplanations().then(()=>{
      const expNow=EXP[q.id]||"אין הסבר זמין לשאלה זו.";
      if(expSlot.isConnected) expSlot.innerHTML=`<div class="expl-h">הסבר</div>${readableMixedText(expNow)}`;
    });
  }
  const loadBtn=fb.querySelector("[data-load-exp]");
  if(loadBtn){
    loadBtn.onclick=async()=>{
      loadBtn.disabled=true;
      loadBtn.textContent="טוען הסבר...";
      await loadExplanations();
      const expNow=EXP[q.id]||"אין הסבר זמין לשאלה זו.";
      loadBtn.closest(".expl").innerHTML=`<div class="expl-h">הסבר</div>${readableMixedText(expNow)}`;
    };
  }
  wireAiButtons(fb,q,k);
  const foot=card.querySelector(".qfoot");foot.innerHTML="";
  const isLast=session.i+1>=session.queue.length;
  const nx=el("button","btn primary",isLast?"סיים":"הבא ←");nx.setAttribute("aria-label",isLast?"סיים סבב":"השאלה הבאה");nx.setAttribute("aria-keyshortcuts","Enter");nx.onclick=()=>nextQ();foot.append(nx);
  if(record)fb.focus({preventScroll:true});
}
function skipQ(){
  if(!session)return;
  const q=qById(session.queue[session.i]);
  if(session.mode==="exam"&&!session.answered&&q){
    session.wrong++;
    session.answers=session.answers.filter(a=>!(a.index===session.i&&a.id===q.id));
    session.answers.push({index:session.i,id:q.id,k:null,ok:false,skipped:true,at:Date.now()});
  }
  nextQ();
}
function nextQ(){
  if(!session)return;
  session.i++;
  session.answered=false;
  session.lastAnswer=null;
  saveSession();
  renderQuiz();
  window.scrollTo({top:0,behavior:"auto"});
}
function timeLeft(){
  if(!session||session.mode!=="exam")return 0;
  return Math.max(0,session.durationSec-Math.floor((Date.now()-session.startedAt)/1000));
}
function startTimer(){
  stopTimer();
  if(!session||session.mode!=="exam")return;
  updateTimer();
  timerHandle=setInterval(updateTimer,1000);
}
function stopTimer(){ if(timerHandle){clearInterval(timerHandle);timerHandle=null;} }
function updateTimer(){
  if(!session||session.mode!=="exam"){stopTimer();return;}
  const left=timeLeft();
  const node=$("#timer"); if(node)node.textContent=timerText(left);
  if(left<=0){toast("הזמן הסתיים");go("quiz");submitExam();}
}
function renderSessionEnd(){
  stopTimer();
  const done={...session,queue:session.queue.slice(),answers:(session.answers||[]).slice()};
  lastCompletedSession=done;
  clearSavedSession();
  const v=$("#view-quiz");const tot=done.correct+done.wrong;

   <h2 style="margin:6px 0">סיימת!</h2>
   <div class="grid g3" style="margin:14px 0">
     <div class="stat"><div class="n">${done.correct}</div><div class="l">נכון</div></div>
     <div class="stat"><div class="n">${done.wrong}</div><div class="l">טעות/דילוג</div></div>
     <div class="stat"><div class="n">${acc}%</div><div class="l">דיוק</div></div>
   </div>`;
  const b=el("button","btn primary","חזרה לבית");b.setAttribute("aria-label","חזרה למסך הבית");b.onclick=()=>{session=null;go("home");};
  c.append(b);
  if(done.mode==="exam"){
    const rev=el("button","btn","סקירת המבחן");rev.style.marginTop="10px";rev.onclick=()=>renderExamReview(done);c.append(rev);
  }
  if(done.wrong>0){
    const w=el("button","btn","חזור על הטעויות מהסבב");w.style.marginTop="10px";
    const wrongSet=new Set(done.answers.filter(a=>!a.ok).map(a=>a.id));
    const retryIds=completedQueue.filter(id=>wrongSet.has(id)||((PROG[id]||{}).box<=1));
    w.onclick=()=>startSession(retryIds.length?retryIds:completedQueue,"חזרה על טעויות",false,{source:"recent-mistakes",reviewFirst:true});
    c.append(w);

  v.append(c);

}
function renderExamReview(done=lastCompletedSession){
  if(!done)return;
  const v=$("#view-quiz");v.innerHTML="";
  sectionTitle(v,"quiz-title","סקירת מבחן");

    const chosen=a?.skipped?"דולג":(Number.isInteger(a?.k)?`${LETTERS[a.k]}. ${readableMixedText(q.o[a.k])}`:"לא נענה");
    row.innerHTML=`<div class="qhead"><b>${idx+1}. ${escapeHtml(yearLabel(q.t))}</b><span>${a&&a.ok?"נכון":"דורש חזרה"}</span></div>
      <div class="qq">${readableMixedText(q.q)}</div>
      <div class="meta"><span>נבחר: ${chosen}</span><span>מתקבל: ${accept.map(i=>LETTERS[i]).join(", ")}</span>${KEY_DOUBTS[id]?'<span style="color:var(--warn)">דגל מפתח</span>':""}</div>`;
    list.append(row);

  const row=el("div","toolbar");row.style.marginTop="14px";

  const home=el("button","btn","בית");home.onclick=()=>go("home");
  row.append(retry,home);c.append(row);v.append(c);
