<style>
:root{
  --bg:#0b1020; --bg2:#11172e; --card:#161d38; --card2:#1c2547;
  --line:#28315a; --txt:#e8ecfb; --muted:#9aa6d4; --faint:#92a0d6;
  --accent:#5b4bd6; --accent2:#22d3b7; --accent-d:#4938bf;
  --good:#34d399; --good-bg:#0f3d33; --bad:#fb7185; --bad-bg:#3d1622;
  --warn:#fbbf24; --chip:#222c52; --focus:#ffffff; --shadow:0 10px 40px rgba(0,0,0,.45);
  --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-padding-top:12px}
html,body{margin:0;padding:0}
body{
  font-family:"Segoe UI",Rubik,Arial,system-ui,sans-serif;
  background:radial-gradient(1200px 700px at 80% -10%,#1a2348 0,transparent 60%),
             radial-gradient(900px 600px at -10% 10%,#10243a 0,transparent 55%),var(--bg);
  color:var(--txt);min-height:100vh;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:880px;margin:0 auto;padding:14px 14px 96px}
a{color:var(--accent2)}
button,input{font-family:inherit}
button{touch-action:manipulation}
button:focus{outline:none}
button:focus-visible,input:focus-visible,.fb:focus-visible,.ai-output:focus-visible{
  outline:3px solid var(--focus);
  outline-offset:3px;
  box-shadow:0 0 0 6px rgba(34,211,183,.28);
}
.hidden{display:none!important}
.skip-link{position:fixed;top:8px;right:8px;z-index:100;background:var(--focus);color:var(--bg);
  border-radius:10px;padding:10px 14px;font-weight:800;transform:translateY(-140%);transition:.15s transform}
.skip-link:focus{transform:translateY(0);outline:3px solid var(--accent2);outline-offset:2px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ---- header ---- */
header.app{
  display:flex;align-items:center;gap:12px;padding:10px 4px 16px;
}
.logo{
  width:46px;height:46px;border-radius:13px;flex:0 0 auto;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;font-size:26px;box-shadow:var(--shadow);
}
.htxt h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px}
.htxt p{margin:1px 0 0;font-size:12.5px;color:var(--muted)}
.htxt{flex:1;min-width:0}

/* ---- cards / grid ---- */
.card{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);
  border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:560px){.g3{grid-template-columns:1fr 1fr}}

.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
.stat .n{font-size:26px;font-weight:800;color:var(--accent2)}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px}

h2.sec{font-size:14px;color:var(--muted);font-weight:600;margin:22px 4px 10px;text-transform:uppercase;letter-spacing:1px}

/* ---- buttons ---- */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  border:1px solid var(--line);background:var(--card2);color:var(--txt);
  padding:14px 16px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;
  transition:.15s transform,.15s background,.15s border-color}
.btn:hover{background:#222c52;border-color:var(--accent)}
.btn:active{transform:scale(.98)}
.btn.primary{background:linear-gradient(135deg,var(--accent-d),var(--accent));border:none}
.btn.primary:hover{filter:brightness(1.08)}
.btn.warn{border-color:var(--warn);color:var(--warn)}
.btn .ic{font-size:19px}
.btn .sub{font-size:11.5px;color:var(--muted);font-weight:500}
.btn.col{flex-direction:column;gap:3px;text-align:center}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.iconbtn{width:44px;min-width:44px;height:44px;border-radius:12px;border:1px solid var(--line);
  background:var(--card2);color:var(--txt);display:grid;place-items:center;cursor:pointer;font-size:18px}
.iconbtn.on{background:rgba(251,191,36,.18);border-color:var(--warn);color:var(--warn)}
.timer{font-variant-numeric:tabular-nums;color:var(--warn);font-weight:800}

/* ---- chips ---- */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--chip);border:1px solid var(--line);border-radius:999px;
  min-height:44px;padding:7px 13px;font-size:13px;cursor:pointer;color:var(--txt);transition:.15s;display:flex;gap:7px;align-items:center}
.chip:hover{border-color:var(--accent)}
.chip .c{color:var(--faint);font-size:12px}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.on .c{color:#fff}

/* ---- quiz ---- */
.qhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;font-size:12.5px;color:var(--muted)}
.qmeta{display:flex;gap:6px;flex-wrap:wrap}
.tag{background:var(--chip);border:1px solid var(--line);border-radius:8px;padding:2px 9px;font-size:11.5px;color:var(--muted)}
.tag.acc{color:var(--accent2);border-color:var(--accent2)}
.progbar{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;margin:4px 0 14px}
.progbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s width}
.qtext{font-size:18px;font-weight:600;line-height:1.7;margin:6px 0 16px}
.opts{display:grid;gap:10px}
.opt{display:flex;gap:12px;align-items:flex-start;background:var(--card2);border:1.5px solid var(--line);
  border-radius:13px;min-height:56px;padding:13px 14px;cursor:pointer;font-size:15.5px;transition:.13s;text-align:right;width:100%;color:var(--txt)}
.opt:hover{border-color:var(--accent)}
.opt .k{flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:var(--chip);
  display:grid;place-items:center;font-weight:700;font-size:14px;color:var(--muted)}
.opt .ot{flex:1;padding-top:1px;unicode-bidi:plaintext}
.opt.correct{border-color:var(--good);background:var(--good-bg)}
.opt.correct .k{background:var(--good);color:#04231a}
.opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
.opt.wrong .k{background:var(--bad);color:#3d0a14}
.opt.dim{opacity:.55}
.opt.sel{border-color:var(--accent);background:#222c52}
.opt.sel .k{background:var(--accent);color:#fff}
.exam-banner{font-size:12px;color:var(--muted);margin:-4px 0 12px;display:flex;gap:10px;flex-wrap:wrap}
.exam-banner b{color:var(--accent2)}
.opt[disabled]{cursor:default}

.fb{margin-top:14px;border-radius:13px;padding:13px 15px;font-size:14px;display:none}
.fb.show{display:block}
.fb.ok{background:var(--good-bg);border:1px solid var(--good)}
.fb.no{background:var(--bad-bg);border:1px solid var(--bad)}
.fb .ref{margin-top:7px;font-size:13px;color:var(--muted)}
.fb .ref b{color:var(--accent2);font-weight:600}
.expl{margin-top:10px;padding:11px 13px;background:rgba(124,108,255,.10);border:1px solid var(--line);border-radius:11px;font-size:14px;line-height:1.75;unicode-bidi:plaintext}
.expl-h{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--accent2);margin-bottom:5px}
.fb .note{margin-top:6px;font-size:12.5px;color:var(--warn)}

.qfoot{display:flex;gap:10px;margin-top:16px}
.qfoot .btn{flex:1}

/* ---- browse / search ---- */
.search{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;
  color:var(--txt);min-height:48px;padding:13px 15px;font-size:15px;font-family:inherit}
.search:focus{border-color:var(--accent)}
.qitem{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px}
.qitem .qq{font-weight:600;margin-bottom:8px}
.qitem .oo{font-size:14px;color:var(--muted);padding:3px 0;unicode-bidi:plaintext}
.qitem .oo.c{color:var(--good);font-weight:600}
.qitem .meta{font-size:11.5px;color:var(--faint);margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.hl{background:rgba(251,191,36,.2);color:var(--txt);border-bottom:1px solid var(--warn)}
.pager{display:flex;gap:8px;align-items:center;justify-content:space-between;margin:10px 0}
.pager .btn{width:auto;min-width:96px;padding:10px 12px}
.review-list{display:grid;gap:10px;margin-top:12px}
.review-row{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px}
.review-row.ok{border-color:var(--good)}
.review-row.no{border-color:var(--bad)}
.ai-box{margin-top:10px;padding:12px;border:1px solid var(--line);border-radius:12px;background:rgba(34,211,183,.08)}
.ai-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.ai-actions .btn{width:auto;min-height:44px;padding:9px 12px;font-size:13px}
.ai-output{margin-top:10px;white-space:pre-wrap;unicode-bidi:plaintext}

/* ---- bottom nav ---- */
nav.bar{position:fixed;bottom:0;left:0;right:0;background:rgba(11,16,32,.92);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;z-index:20;
  padding-bottom:env(safe-area-inset-bottom)}
nav.bar button{flex:1;background:none;border:none;color:var(--faint);padding:9px 4px 8px;
  min-height:52px;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600}
nav.bar button .ni{font-size:20px}
nav.bar button.on{color:var(--accent2)}

/* progress ring */
.ring{position:relative;width:120px;height:120px;margin:0 auto}
.ring svg{transform:rotate(-90deg)}
.ring .mid{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring .mid b{font-size:24px;font-weight:800}
.ring .mid span{font-size:11px;color:var(--muted)}
.muted{color:var(--muted)} .small{font-size:12.5px}
.kbd{font-size:11px;color:var(--faint);background:var(--chip);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
.toast{position:fixed;bottom:78px;right:50%;transform:translateX(50%);background:var(--card2);
  border:1px solid var(--accent);border-radius:10px;padding:9px 16px;font-size:13px;z-index:40;
  opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.auth-card{max-width:520px;margin:24px auto 0}
.auth-form{display:grid;gap:12px;margin-top:14px}
.field{display:grid;gap:6px}
.field label{font-size:13px;color:var(--muted);font-weight:700}
.input{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;
  color:var(--txt);min-height:48px;padding:12px 14px;font-size:15px}
.input:focus{border-color:var(--accent)}
.auth-msg{min-height:22px;color:var(--warn);font-size:13px}
.update-banner{position:fixed;left:12px;right:12px;bottom:78px;z-index:45;background:var(--card);
  border:1px solid var(--accent2);border-radius:14px;box-shadow:var(--shadow);padding:10px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.update-banner .btn{width:auto;min-height:44px;padding:8px 14px}
.banner{background:linear-gradient(135deg,#2a1d52,#19234a);border:1px solid var(--line);border-radius:14px;padding:13px 16px;font-size:13px;color:var(--muted);margin-bottom:14px}
.banner b{color:var(--txt)}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.01ms!important}
  .skip-link{transition:none}
}
@media (prefers-reduced-data: reduce){
  body{background:var(--bg)}
  .card,.logo{box-shadow:none}
  nav.bar{backdrop-filter:none}
}
</style>
</head>

<script>
"use strict";
const LETTERS = ["א","ב","ג","ד"];
const PROG_KEY = "psych_shlava_progress_v1";
const STAR_KEY = "psych_shlava_stars_v1";
const SESSION_KEY = "psych_shlava_session_v1";
const INSTALL_COACH_KEY = "psych_shlava_install_coach_v1";
const SUPABASE_SESSION_KEY = "psych_shlava_supabase_session_v1";
const AUTH_REQUIRED_KEY = "psych_shlava_auth_required_v1";
const DB_NAME = "psych_shlava_local_v1";
const DB_STORE = "kv";
const PAGE_SIZE = 100;
const EXAM_SECONDS_PER_Q = 72;
let QUESTIONS = [], TOPICS = [], PROG = {}, EXP = {}, KEY_DOUBTS = {}, QMAP = new Map();
let STARS = new Set();
let EXP_PROMISE = null;
let DB_PROMISE = null;
let timerHandle = null;
let storageWarned = false;
let persistAsked = false;
let lastCompletedSession = null;
let AUTH = {required:false,config:null,session:null,user:null,token:""};
let SYNC_READY = false, SYNC_PAUSED = false, fullSyncDirty = false, starsDirty = false, sessionDirty = false, syncTimer = null;
let dirtyProgress = new Set();
const REDUCE_DATA = !!(navigator.connection?.saveData || window.matchMedia?.("(prefers-reduced-data: reduce)")?.matches);
const $ = (s,r=document)=>r.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;if(t==="button")e.type="button";return e;};
function sectionTitle(view,id,text){ const h=el("h2","sr-only",text); h.id=id; view.append(h); }

/* ---------- local storage (IndexedDB first, localStorage fallback) ---------- */
async function openDb(){
  if(!("indexedDB" in window))throw new Error("IndexedDB unavailable");
  if(DB_PROMISE)return DB_PROMISE;
  DB_PROMISE=new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=()=>req.result.createObjectStore(DB_STORE);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error||new Error("IndexedDB open failed"));
  });
  return DB_PROMISE;
}
async function idbGet(key){
  const db=await openDb();
  return new Promise((resolve,reject)=>{
    const req=db.transaction(DB_STORE,"readonly").objectStore(DB_STORE).get(key);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function idbSet(key,value){
  const db=await openDb();
  return new Promise((resolve,reject)=>{
    const req=db.transaction(DB_STORE,"readwrite").objectStore(DB_STORE).put(value,key);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
async function idbDel(key){
  const db=await openDb();
  return new Promise((resolve,reject)=>{
    const req=db.transaction(DB_STORE,"readwrite").objectStore(DB_STORE).delete(key);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
async function readLocal(key,fallback){
  try{
    const value=await idbGet(key);
    if(value!==undefined)return value;
  }catch(e){}
  try{
    const raw=localStorage.getItem(key);
    if(raw!=null){
      const value=JSON.parse(raw);
      idbSet(key,value).catch(()=>{});
      return value;
    }
  }catch(e){}
  return fallback;
}
function requestPersistentStorage(){
  if(persistAsked||!navigator.storage?.persist||!navigator.storage?.persisted)return;
  persistAsked=true;
  navigator.storage.persisted().then(ok=>ok||navigator.storage.persist()).then(ok=>{
    if(ok)toast("השמירה המקומית קיבלה הגנה משופרת");
  }).catch(()=>{});
}
function saveLocal(key,value){
  requestPersistentStorage();
  idbSet(key,value).catch(()=>{
    try{localStorage.setItem(key,JSON.stringify(value));}
    catch(e){ if(!storageWarned){storageWarned=true;toast("לא ניתן לשמור נתונים בדפדפן");} }
  });
}
function userKey(key){ return AUTH.user?.id ? `${key}:${AUTH.user.id}` : key; }
async function readUserLocal(key,fallback){
  const scoped=await readLocal(userKey(key),undefined);
  if(scoped!==undefined)return scoped;
  if(AUTH.user?.id){
    const legacy=await readLocal(key,undefined);
    if(legacy!==undefined){
      saveLocal(userKey(key),legacy);
      return legacy;
    }
  }
  return fallback;
}
function saveUserLocal(key,value){ saveLocal(userKey(key),value); }
async function delUserLocal(key){
  idbDel(userKey(key)).catch(()=>{});
  try{localStorage.removeItem(userKey(key));}catch(e){}
}

/* ---------- Supabase progress sync ---------- */
function recordPayload(value){
  return value&&typeof value==="object"&&!Array.isArray(value)?value:{};
}
function mergeProgressRecord(local={},cloud={}){
  return {
    box:Math.max(Number(local.box)||0,Number(cloud.box)||0),
    seen:Math.max(Number(local.seen)||0,Number(cloud.seen)||0),
    correct:Math.max(Number(local.correct)||0,Number(cloud.correct)||0),
    wrong:Math.max(Number(local.wrong)||0,Number(cloud.wrong)||0),
    due:[Number(local.due)||0,Number(cloud.due)||0].filter(Boolean).sort((a,b)=>a-b)[0]||0,
    last:Math.max(Number(local.last)||0,Number(cloud.last)||0)
  };
}
function validSessionPayload(value){
  return value&&Array.isArray(value.queue)&&value.queue.length ? value : null;
}
function markCloudDirty({progressId=null,stars=false,session=false,full=false}={}){
  if(SYNC_PAUSED)return;
  if(progressId)dirtyProgress.add(progressId);
  if(stars)starsDirty=true;
  if(session)sessionDirty=true;
  if(full)fullSyncDirty=true;
  scheduleCloudSync();
}
function scheduleCloudSync(){
  if(!AUTH.required||!AUTH.user||!SYNC_READY)return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>pushCloudChanges().catch(()=>toast("סנכרון ענן נכשל")),1400);
}
async function pullCloudState(){
  if(!AUTH.user)return null;
  const uid=encodeURIComponent(AUTH.user.id);
  const [pRes,sRes,sessionRes]=await Promise.all([
    supabaseRest(`study_progress?select=question_id,payload,updated_at&user_id=eq.${uid}`),
    supabaseRest(`study_stars?select=question_id,updated_at&user_id=eq.${uid}`),
    supabaseRest(`study_sessions?select=payload,updated_at&user_id=eq.${uid}&limit=1`)
  ]);
  if(!pRes.ok||!sRes.ok||!sessionRes.ok)throw new Error("cloud pull failed");
  return {
    progress:await pRes.json(),
    stars:await sRes.json(),
    sessions:await sessionRes.json()
  };
}
async function mergeCloudState(){
  if(!AUTH.user)return;
  SYNC_PAUSED=true;
  try{
    const cloud=await pullCloudState();
    const cloudProgress={};
    (Array.isArray(cloud.progress)?cloud.progress:[]).forEach(row=>{
      if(QMAP.has(row.question_id))cloudProgress[row.question_id]=recordPayload(row.payload);
    });
    const merged={...PROG};
    Object.keys(cloudProgress).forEach(id=>{ merged[id]=mergeProgressRecord(merged[id],cloudProgress[id]); });
    Object.keys(PROG).forEach(id=>{ merged[id]=mergeProgressRecord(PROG[id],cloudProgress[id]); });
    PROG=merged;
    const cloudStars=new Set((Array.isArray(cloud.stars)?cloud.stars:[]).map(row=>row.question_id).filter(id=>QMAP.has(id)));
    STARS=new Set([...STARS,...cloudStars]);
    const cloudSession=validSessionPayload(cloud.sessions?.[0]?.payload);
    const cloudSessionMs=cloudSession?Math.max(Number(cloudSession.updatedAt)||0,Date.parse(cloud.sessions?.[0]?.updated_at||"")||0):0;
    const localSessionMs=session?Number(session.updatedAt||session.startedAt)||0:0;
    if(cloudSession&&(!session||cloudSessionMs>localSessionMs)){
      session=cloudSession;
    }
    saveUserLocal(PROG_KEY,PROG);
    saveUserLocal(STAR_KEY,[...STARS]);
    if(session)saveUserLocal(SESSION_KEY,session);
  }finally{
    SYNC_PAUSED=false;
  }
  SYNC_READY=true;
  markCloudDirty({full:true});
}
async function pushJsonRows(path,rows,onConflict){
  if(!rows.length)return;
  const res=await supabaseRest(`${path}?on_conflict=${onConflict}`,{
    method:"POST",
    headers:{"Prefer":"resolution=merge-duplicates,return=minimal"},
    body:JSON.stringify(rows)
  });
  if(!res.ok)throw new Error(`${path} upsert failed`);
}
async function deleteUserRows(path){
  const res=await supabaseRest(`${path}?user_id=eq.${encodeURIComponent(AUTH.user.id)}`,{method:"DELETE"});
  if(!res.ok)throw new Error(`${path} delete failed`);
}
async function pushCloudChanges(){
  if(!AUTH.user||!SYNC_READY)return;
  const uid=AUTH.user.id;
  const progressIds=fullSyncDirty?Object.keys(PROG):[...dirtyProgress];
  if(fullSyncDirty){
    await Promise.all([deleteUserRows("study_progress"),deleteUserRows("study_stars"),deleteUserRows("study_sessions")]);
  }
  if(progressIds.length){
    await pushJsonRows("study_progress",progressIds.filter(id=>QMAP.has(id)&&PROG[id]).map(id=>({
      user_id:uid,question_id:id,payload:PROG[id],updated_at:new Date().toISOString()
    })),"user_id,question_id");
  }
  if(fullSyncDirty||starsDirty){
    if(!fullSyncDirty)await deleteUserRows("study_stars");
    await pushJsonRows("study_stars",[...STARS].filter(id=>QMAP.has(id)).map(id=>({
      user_id:uid,question_id:id,updated_at:new Date().toISOString()
    })),"user_id,question_id");
  }
  if(fullSyncDirty||sessionDirty){
    await deleteUserRows("study_sessions");
    if(session&&session.i<session.queue.length){
      await pushJsonRows("study_sessions",[{user_id:uid,payload:session,updated_at:new Date().toISOString()}],"user_id");
    }
  }
  dirtyProgress.clear(); fullSyncDirty=false; starsDirty=false; sessionDirty=false;
}

/* ---------- authentication ---------- */
function storedSupabaseSession(){
  try{
    const value=JSON.parse(localStorage.getItem(SUPABASE_SESSION_KEY)||"null");
    if(!value?.access_token||!value?.refresh_token)return null;
    return value;
  }catch(e){return null;}
}
function saveSupabaseSession(value){
  AUTH.session=value;
  AUTH.token=value?.access_token||"";
  AUTH.user=value?.user||AUTH.user||null;
  try{localStorage.setItem(SUPABASE_SESSION_KEY,JSON.stringify(value));}
  catch(e){}
}
function clearAuth(){
  AUTH={required:AUTH.required,config:AUTH.config,session:null,user:null,token:""};
  SYNC_READY=false; dirtyProgress=new Set(); fullSyncDirty=false; starsDirty=false; sessionDirty=false;
  try{localStorage.removeItem(SUPABASE_SESSION_KEY);}catch(e){}
}
function authRequiredStored(){
  try{return localStorage.getItem(AUTH_REQUIRED_KEY)==="1";}
  catch(e){return false;}
}
function storeAuthRequired(required){
  try{
    if(required)localStorage.setItem(AUTH_REQUIRED_KEY,"1");
    else localStorage.removeItem(AUTH_REQUIRED_KEY);
  }catch(e){}
}
function authHeaders(extra={}){
  const headers={...extra};
  if(AUTH.token)headers.Authorization=`Bearer ${AUTH.token}`;
  return headers;
}
function authFetch(path,opts={}){
  return fetch(path,{...opts,headers:authHeaders(opts.headers||{})});
}
function dataFetch(path,opts={}){
  // On the auth-enabled (Netlify) deploy, hit the protected-asset function directly with
  // ?path= — the netlify.toml rewrite does not forward the query to the v2 function.
  // On GitHub Pages (AUTH.required=false) this is a plain static fetch (no change).
  if(AUTH.required && /^(data|docs)\//.test(path)){
    return authFetch(`/api/protected-asset?path=${encodeURIComponent(path)}`,opts);
  }
  return authFetch(path,opts);
}
function supabaseBase(path){
  return `${AUTH.config.url}${path}`;
}
function normalizeSupabaseSession(payload){
  const src=payload?.session||payload||{};
  if(!src.access_token||!src.refresh_token)return null;
  const expiresAt=Number(src.expires_at)||Math.floor(Date.now()/1000)+(Number(src.expires_in)||3600);
  return {
    access_token:src.access_token,
    refresh_token:src.refresh_token,
    expires_at:expiresAt,
    token_type:src.token_type||"bearer",
    user:payload?.user||src.user||AUTH.user||null
  };
}
async function supabaseAuthRequest(path,opts={}){
  const headers={"apikey":AUTH.config.key,"Content-Type":"application/json",...(opts.headers||{})};
  if(opts.auth!==false&&AUTH.token)headers.Authorization=`Bearer ${AUTH.token}`;
  return fetch(supabaseBase(path),{...opts,headers});
}
async function supabaseRest(path,opts={}){
  const headers={
    "apikey":AUTH.config.key,
    "Authorization":`Bearer ${AUTH.token}`,
    "Content-Type":"application/json",
    ...(opts.headers||{})
  };
  return fetch(supabaseBase(`/rest/v1/${path}`),{...opts,headers});
}
async function refreshSupabaseSession(){
  if(!AUTH.config||!AUTH.session?.refresh_token)return false;
  const res=await supabaseAuthRequest("/auth/v1/token?grant_type=refresh_token",{
    method:"POST",auth:false,body:JSON.stringify({refresh_token:AUTH.session.refresh_token})
  });
  if(!res.ok)return false;
  const session=normalizeSupabaseSession(await res.json().catch(()=>({})));
  if(!session)return false;
  saveSupabaseSession(session);
  return true;
}
async function verifySupabaseSession(){
  if(!AUTH.config||!AUTH.session)return false;
  if((Number(AUTH.session.expires_at)||0)-60<=Math.floor(Date.now()/1000)){
    if(!(await refreshSupabaseSession()))return false;
  }
  const res=await supabaseAuthRequest("/auth/v1/user",{method:"GET"});
  if(!res.ok)return false;
  const user=await res.json().catch(()=>null);
  if(!user?.id)return false;
  AUTH.user=user;
  saveSupabaseSession({...AUTH.session,user});
  return true;
}
function setAuthChrome(){
  const locked=AUTH.required&&!AUTH.user;
  document.querySelector("nav.bar")?.classList.toggle("hidden",locked);
  const out=$("#auth-logout");
  if(out){
    out.classList.toggle("hidden",!AUTH.required||!AUTH.user);
    out.onclick=()=>logout();
  }
}
async function initAuth(){
  const remembered=authRequiredStored();
  // Static-only hosts (GitHub Pages) have no Netlify Functions, so auth is impossible
  // there — it's the public/offline build. Skip the /api probe (avoids a 404 log) and
  // never gate the bank. Auth + cross-device sync activate only on the Netlify deploy.
  if(/(^|\.)github\.io$/.test(location.hostname)){
    AUTH.required=false;
    storeAuthRequired(false);
    setAuthChrome();
    return true;
  }
  try{
    const res=await fetch("/api/supabase-config",{cache:"no-store",headers:{"Accept":"application/json"}});
    if(res.ok){
      const data=await res.json().catch(()=>({}));
      AUTH.required=!!data.enabled;
      AUTH.config=AUTH.required?{url:String(data.url||"").replace(/\/+$/,""),key:String(data.key||"")}:null;
      storeAuthRequired(AUTH.required);
    }else{
      AUTH.required=remembered;
    }
  }catch(e){
    AUTH.required=remembered;
  }
  if(!AUTH.required){setAuthChrome();return true;}
  if(!AUTH.config){setAuthChrome();return false;}
  const saved=storedSupabaseSession();
  if(!saved){setAuthChrome();return false;}
  saveSupabaseSession(saved);
  try{ if(await verifySupabaseSession()){setAuthChrome();return true;} }
  catch(e){}
  clearAuth();
  setAuthChrome();
  return false;
}

async function loadProg(){ PROG=await readUserLocal(PROG_KEY,{})||{}; }
function saveProg(changedId=null){ saveUserLocal(PROG_KEY,PROG); markCloudDirty(changedId?{progressId:changedId}:{full:true}); }
async function loadStars(){ STARS=new Set(await readUserLocal(STAR_KEY,[])||[]); }
function saveStars(){ saveUserLocal(STAR_KEY,[...STARS]); markCloudDirty({stars:true}); }
const BOX_DAYS=[0,1,3,7,16,40];
function rec(id){ return PROG[id]||(PROG[id]={box:0,seen:0,correct:0,wrong:0,due:0,last:0}); }
function grade(id,ok){
  const r=rec(id); r.seen++; r.last=Date.now();
  if(ok){ r.correct++; r.box=Math.min(r.box+1,5); }
  else { r.wrong++; r.box=Math.max(r.box-1,0); }
  r.due = Date.now()+BOX_DAYS[r.box]*864e5;
  saveProg(id);
}
const isDue = id => { const r=PROG[id]; return !r || r.seen===0 || (r.due||0)<=Date.now(); };
const isSeen = id => { const r=PROG[id]; return r && r.seen>0; };
const isWrongPile = id => { const r=PROG[id]; return r && r.wrong>0 && r.box<=1; };
function toggleStar(id, after){
  if(STARS.has(id))STARS.delete(id);else STARS.add(id);
  saveStars();
  toast(STARS.has(id)?"נשמר לשאלות שמורות":"הוסר מהשמורות");
  if(after)after();
}

  b.setAttribute("aria-pressed",on?"true":"false");
  b.onclick=()=>toggleStar(id,after);
  return b;
}

/* ---------- session persistence ---------- */
async function loadSavedSession(){
  try{
    const s=await readUserLocal(SESSION_KEY,null);
    if(!s||!Array.isArray(s.queue)||!s.queue.length)return null;
    s.queue=s.queue.filter(id=>QMAP.has(id));
    if(!s.queue.length)return null;
    s.i=Math.max(0,Math.min(Number(s.i)||0,s.queue.length));
    if(s.i>=s.queue.length)return null;
    s.correct=Number(s.correct)||0;
    s.wrong=Number(s.wrong)||0;
    s.title=String(s.title||"תרגול");
    s.mode=s.mode==="exam"?"exam":"practice";
    s.answers=Array.isArray(s.answers)?s.answers.filter(a=>a&&QMAP.has(a.id)):[];
    if(s.answered && (!s.lastAnswer||s.lastAnswer.id!==s.queue[s.i])){s.answered=false;s.lastAnswer=null;}
    return s;
  }catch(e){return null;}
}
function saveSession(){
  if(!session||session.i>=session.queue.length){clearSavedSession();return;}
  session.updatedAt=Date.now();
  saveUserLocal(SESSION_KEY,session);
  markCloudDirty({session:true});
}
function clearSavedSession(){
  delUserLocal(SESSION_KEY);
  markCloudDirty({session:true});
}

/* ---------- QUIZ ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startSession(ids,title,doShuffle,opts={}){
  if(!ids.length){toast("אין שאלות");return;}
  let queue = (doShuffle ? shuffle(ids) : ids.slice()).filter(id=>QMAP.has(id));
  if(!queue.length){toast("אין שאלות זמינות");return;}
  session={queue,i:0,correct:0,wrong:0,title,answered:false,lastAnswer:null,answers:[],
    mode:opts.mode||"practice",source:opts.source||"",startedAt:Date.now(),updatedAt:Date.now(),durationSec:opts.durationSec||0};
  saveSession();
  go("quiz"); renderQuiz();
}
function startExam(t){
  const ids=QUESTIONS.filter(q=>q.t===t).map(q=>q.id);
  startSession(ids,"סימולציה · "+yearLabel(t),false,{mode:"exam",source:t,durationSec:ids.length*EXAM_SECONDS_PER_Q});
}
function renderQuiz(){
  const v=$("#view-quiz");
  if(!session){go("home");return;}
  if(session.i>=session.queue.length){return renderSessionEnd();}
  const q=qById(session.queue[session.i]);
  if(!q){session.i++;saveSession();return renderQuiz();}
  v.innerHTML="";
  sectionTitle(v,"quiz-title","תרגול");
  const card=el("div","card");
  const pct=Math.round(session.i/session.queue.length*100);
  const timer=session.mode==="exam"?`<span class="timer" id="timer">${timerText(timeLeft())}</span>`:"";
  const doubt=KEY_DOUBTS[q.id]?'<span class="tag" style="color:var(--warn);border-color:var(--warn)">דגל מפתח</span>':"";
  const qhead=el("div","qhead",
    `<div class="qmeta"><span class="tag">${escapeHtml(session.title)}</span><span class="tag">${escapeHtml(yearLabel(q.t))}</span><span class="tag acc">${escapeHtml(topicName(q))}</span>${q.vision?'<span class="tag" style="color:var(--warn);border-color:var(--warn)" title="תמלול אוטומטי מהמקור — ודא מול ה-PDF">OCR</span>':""}${doubt}</div>
     <div class="toolbar">${timer}<span>${session.i+1} / ${session.queue.length}</span></div>`);
  qhead.querySelector(".toolbar").prepend(starButton(q.id,()=>renderQuiz()));
  card.append(qhead);
  const pb=el("div","progbar",`<i style="width:${pct}%"></i>`);pb.setAttribute("role","progressbar");pb.setAttribute("aria-label","התקדמות בסבב");pb.setAttribute("aria-valuemin","0");pb.setAttribute("aria-valuemax","100");pb.setAttribute("aria-valuenow",String(pct));card.append(pb);
  const qText=el("div","qtext",escapeHtml(q.q));qText.id="current-question";card.append(qText);
  const opts=el("div","opts");opts.setAttribute("role","group");opts.setAttribute("aria-labelledby","current-question");
  q.o.forEach((o,k)=>{
    const b=el("button","opt",`<span class="k">${LETTERS[k]}</span><span class="ot">${escapeHtml(o)}</span>`);
    b.setAttribute("aria-label",`אפשרות ${LETTERS[k]}: ${o}`);
    b.setAttribute("aria-keyshortcuts",String(k+1));
    b.onclick=()=>answer(q,k,opts,fb,card);
    opts.append(b);
  });
  card.append(opts);
  const fb=el("div","fb");fb.id="grading-feedback";fb.setAttribute("role","status");fb.setAttribute("aria-live","polite");fb.setAttribute("aria-atomic","true");fb.tabIndex=-1;card.append(fb);
  const foot=el("div","qfoot");
  if(session.mode==="exam"){
    // STRICT exam: record selection silently, allow navigation + answer changes, grade only on submit.
    const prevA=(session.answers||[]).find(a=>a.index===session.i);
    if(prevA&&Number.isInteger(prevA.k))opts.children[prevA.k]?.classList.add("sel");
    const answered=new Set((session.answers||[]).filter(a=>Number.isInteger(a.k)).map(a=>a.index)).size;
    const banner=el("div","exam-banner",`<span>נענו <b>${answered}</b> / ${session.queue.length}</span><span>במצב מבחן התשובות וההסברים מוצגים רק בהגשה</span>`);
    card.insertBefore(banner,opts);
    const isLast=session.i+1>=session.queue.length;
    const prev=el("button","btn","→ הקודם");prev.setAttribute("aria-label","שאלה קודמת");prev.disabled=session.i===0;prev.onclick=()=>prevQ();
    const next=el("button","btn examnext",isLast?"לסיום":"הבא ←");next.setAttribute("aria-label",isLast?"מעבר לסיום":"שאלה הבאה");next.setAttribute("aria-keyshortcuts","Enter");next.onclick=()=>{isLast?confirmSubmit():nextQ();};
    const sub=el("button","btn primary","סיום והגשה");sub.setAttribute("aria-label","סיום והגשת המבחן");sub.onclick=()=>confirmSubmit();
    foot.append(prev,next,sub);card.append(foot);
    v.append(card);
  }else{
    const skip=el("button","btn",`דלג`);skip.setAttribute("aria-label","דלג לשאלה הבאה");skip.onclick=()=>skipQ();
    foot.append(skip);card.append(foot);
    v.append(card);
    if(session.answered&&session.lastAnswer&&session.lastAnswer.id===q.id){
      showAnswer(q,session.lastAnswer.k,opts,fb,card,false);
    }
  }
  startTimer();
}
async function answer(q,k,opts,fb,card){
  if(session.mode==="exam"){selectExam(q,k,opts);return;}
  if(session.answered)return;
  showAnswer(q,k,opts,fb,card,true);
}
function selectExam(q,k,opts){
  [...opts.children].forEach((b,idx)=>b.classList.toggle("sel",idx===k));
  session.answers=(session.answers||[]).filter(a=>a.index!==session.i);
  session.answers.push({index:session.i,id:q.id,k,skipped:false,at:Date.now()});
  saveSession();
  const banner=$("#view-quiz .exam-banner b");
  if(banner)banner.textContent=String(new Set(session.answers.filter(a=>Number.isInteger(a.k)).map(a=>a.index)).size);
}
function prevQ(){
  if(!session||session.i<=0)return;
  session.i--;session.answered=false;session.lastAnswer=null;
  saveSession();renderQuiz();window.scrollTo({top:0,behavior:"auto"});
}
function confirmSubmit(){
  if(!session)return;
  const answered=new Set((session.answers||[]).filter(a=>Number.isInteger(a.k)).map(a=>a.index)).size;
  const un=session.queue.length-answered;
  if(un>0&&!confirm(`נותרו ${un} שאלות ללא מענה. להגיש את המבחן בכל זאת?`))return;
  submitExam();
}
function submitExam(){
  if(!session)return;
  stopTimer();
  const byIndex=new Map((session.answers||[]).map(a=>[a.index,a]));
  session.correct=0;session.wrong=0;
  const graded=[];
  session.queue.forEach((id,idx)=>{
    const q=qById(id);if(!q)return;
    const a=byIndex.get(idx);
    const k=a&&Number.isInteger(a.k)?a.k:null;
    const ok=k!=null&&acceptedIndices(q).includes(k);
    if(ok)session.correct++;else session.wrong++;
    grade(id,ok);
    graded.push({index:idx,id,k,ok,skipped:k==null,at:Date.now()});
  });
  session.answers=graded;
  session.i=session.queue.length;
  saveSession();
  renderSessionEnd();
}
function showAnswer(q,k,opts,fb,card,record){
  session.answered=true;
  const accept=acceptedIndices(q);
  const ok=accept.includes(k);
  [...opts.children].forEach((b,idx)=>{
    b.disabled=true;
    if(accept.includes(idx))b.classList.add("correct");
    else if(idx===k)b.classList.add("wrong");
    else b.classList.add("dim");
  });
  if(record){
    if(ok)session.correct++;else session.wrong++;
    session.lastAnswer={id:q.id,k,ok,at:Date.now()};
    session.answers=session.answers.filter(a=>!(a.index===session.i&&a.id===q.id));
    session.answers.push({index:session.i,id:q.id,k,ok,skipped:false,at:Date.now()});
    grade(q.id,ok);
    saveSession();
  }
  fb.className="fb show "+(ok?"ok":"no");
  fb.setAttribute("aria-live",ok?"polite":"assertive");
  let h = ok?"✅ נכון!":"❌ לא נכון";
  if(q.all_accepted) h+=' <span class="note">— כל התשובות התקבלו (שאלה שבוטלה לאחר ערעור)</span>';
  else if(accept.length>1) h+=` <span class="note">— מתקבלות גם: ${accept.map(i=>LETTERS[i]).join(", ")}</span>`;
  const exp=EXP[q.id];
  if(exp) h+=`<div class="expl"><div class="expl-h">הסבר</div>${escapeHtml(exp)}</div>`;
  else if(REDUCE_DATA) h+=`<div class="expl"><div class="expl-h">הסבר</div><button type="button" class="btn" data-load-exp="${q.id}">טען הסבר</button></div>`;
  else h+=`<div class="expl" data-exp-slot="${q.id}"><div class="expl-h">הסבר</div><span class="muted">טוען הסבר...</span></div>`;
  if(q.ref) h+=`<div class="ref">מקור: <b>${escapeHtml(q.ref)}</b> · Kaplan &amp; Sadock Synopsis</div>`;
  if(q.vision) h+='<div class="note">⚠ נוסח השאלה תומלל אוטומטית (מועד 2025 פגום במקור) — התשובות, המפתח וההסבר מהימנים; ודא ניסוח מול ה-PDF</div>';
  const keyDoubt=KEY_DOUBTS[q.id];
  if(keyDoubt) h+=`<div class="note">⚑ דגל לימודי לגבי המפתח הרשמי: ${escapeHtml(keyDoubt.issue)} המפתח הרשמי נשמר ללא שינוי.</div>`;
  h+=aiTutorHtml();
  fb.innerHTML=h;
  const expSlot=fb.querySelector("[data-exp-slot]");
  if(expSlot){
    loadExplanations().then(()=>{
      const expNow=EXP[q.id]||"אין הסבר זמין לשאלה זו.";
      if(expSlot.isConnected) expSlot.innerHTML=`<div class="expl-h">הסבר</div>${escapeHtml(expNow)}`;
    });
  }
  const loadBtn=fb.querySelector("[data-load-exp]");
  if(loadBtn){
    loadBtn.onclick=async()=>{
      loadBtn.disabled=true;
      loadBtn.textContent="טוען הסבר...";
      await loadExplanations();
      const expNow=EXP[q.id]||"אין הסבר זמין לשאלה זו.";
      loadBtn.closest(".expl").innerHTML=`<div class="expl-h">הסבר</div>${escapeHtml(expNow)}`;
    };
  }
  wireAiButtons(fb,q,k);
  const foot=card.querySelector(".qfoot");foot.innerHTML="";
  const isLast=session.i+1>=session.queue.length;
  const nx=el("button","btn primary",isLast?"סיים":"הבא ←");nx.setAttribute("aria-label",isLast?"סיים סבב":"השאלה הבאה");nx.setAttribute("aria-keyshortcuts","Enter");nx.onclick=()=>nextQ();foot.append(nx);
  if(record)fb.focus({preventScroll:true});
}
function skipQ(){
  if(!session)return;
  const q=qById(session.queue[session.i]);
  if(session.mode==="exam"&&!session.answered&&q){
    session.wrong++;
    session.answers=session.answers.filter(a=>!(a.index===session.i&&a.id===q.id));
    session.answers.push({index:session.i,id:q.id,k:null,ok:false,skipped:true,at:Date.now()});
  }
  nextQ();
}
function nextQ(){
  if(!session)return;
  session.i++;
  session.answered=false;
  session.lastAnswer=null;
  saveSession();
  renderQuiz();
  window.scrollTo({top:0,behavior:"auto"});
}
function timeLeft(){
  if(!session||session.mode!=="exam")return 0;
  return Math.max(0,session.durationSec-Math.floor((Date.now()-session.startedAt)/1000));
}
function startTimer(){
  stopTimer();
  if(!session||session.mode!=="exam")return;
  updateTimer();
  timerHandle=setInterval(updateTimer,1000);
}
function stopTimer(){ if(timerHandle){clearInterval(timerHandle);timerHandle=null;} }
function updateTimer(){
  if(!session||session.mode!=="exam"){stopTimer();return;}
  const left=timeLeft();
  const node=$("#timer"); if(node)node.textContent=timerText(left);
  if(left<=0){toast("הזמן הסתיים");go("quiz");submitExam();}
}
function renderSessionEnd(){

  lastCompletedSession=done;

   <h2 style="margin:6px 0">סיימת!</h2>
   <div class="grid g3" style="margin:14px 0">
     <div class="stat"><div class="n">${done.correct}</div><div class="l">נכון</div></div>
     <div class="stat"><div class="n">${done.wrong}</div><div class="l">טעות/דילוג</div></div>
     <div class="stat"><div class="n">${acc}%</div><div class="l">דיוק</div></div>
   </div>`;

    row.innerHTML=`<div class="qhead"><b>${idx+1}. ${escapeHtml(yearLabel(q.t))}</b><span>${a&&a.ok?"נכון":"דורש חזרה"}</span></div>
      <div class="qq">${escapeHtml(q.q)}</div>
      <div class="meta"><span>נבחר: ${chosen}</span><span>מתקבל: ${accept.map(i=>LETTERS[i]).join(", ")}</span>${KEY_DOUBTS[id]?'<span style="color:var(--warn)">דגל מפתח</span>':""}</div>`;
    list.append(row);
  });
  c.append(list);
  const row=el("div","toolbar");row.style.marginTop="14px";
  const wrongIds=done.answers.filter(a=>!a.ok).map(a=>a.id);
  const retry=el("button","btn primary","תרגל טעויות");retry.onclick=()=>startSession(wrongIds.length?wrongIds:done.queue,"טעויות מהמבחן");
  const home=el("button","btn","בית");home.onclick=()=>go("home");
  row.append(retry,home);c.append(row);v.append(c);
}

/* ---------- BROWSE ---------- */
let browseState={q:"",ti:-1,filter:"all",page:0};
function renderBrowse(){
  const v=$("#view-browse");v.innerHTML="";
  sectionTitle(v,"browse-title","עיון");
  const s=el("input","search");s.placeholder="חיפוש בשאלות, תשובות, מקורות…";s.value=browseState.q;
  s.type="search";s.setAttribute("aria-label","חיפוש בשאלות, תשובות ומקורות");
  s.oninput=()=>{browseState.q=s.value;browseState.page=0;drawList();};
  v.append(s);
  const fc=el("div","chips");fc.style.margin="12px 0";
  [
    ["all","הכל"],["ocr","OCR"],["keyDoubt","דגל מפתח"],["allAccepted","בוטלו"],["multi","ריבוי תשובות"],["weak","חלשות"],["star","שמורות"]
  ].forEach(([id,label])=>{
    const b=el("button","chip"+(browseState.filter===id?" on":""),label);
    b.setAttribute("aria-pressed",browseState.filter===id?"true":"false");
    b.onclick=()=>{browseState.filter=id;browseState.page=0;renderBrowse();};
    fc.append(b);
  });
  v.append(fc);
  // topic filter chips
  const tc=el("div","chips");tc.style.margin="12px 0";
  const all=el("button","chip"+(browseState.ti<0?" on":""),"כל הנושאים");all.setAttribute("aria-pressed",browseState.ti<0?"true":"false");all.onclick=()=>{browseState.ti=-1;browseState.page=0;renderBrowse();};
  tc.append(all);
  const tps=byTopic();
  Object.keys(tps).map(Number).sort((a,b)=>tps[b]-tps[a]).forEach(ti=>{
    const topic=TOPICS[ti]||"";
    const c=el("button","chip"+(browseState.ti===ti?" on":""),`${escapeHtml(topic)} <span class="c">${tps[ti]}</span>`);
    c.setAttribute("aria-label",`סנן לפי נושא ${topic}, ${tps[ti]} שאלות`);
    c.setAttribute("aria-pressed",browseState.ti===ti?"true":"false");
    c.onclick=()=>{browseState.ti=ti;browseState.page=0;renderBrowse();};tc.append(c);
  });
  v.append(tc);
  const list=el("div");list.id="blist";v.append(list);
  drawList();
}
function browsePass(q){
  if(browseState.ti>=0&&q.ti!==browseState.ti)return false;
  const accept=acceptedIndices(q);
  if(browseState.filter==="ocr"&&!q.vision)return false;
  if(browseState.filter==="keyDoubt"&&!KEY_DOUBTS[q.id])return false;
  if(browseState.filter==="allAccepted"&&!q.all_accepted)return false;
  if(browseState.filter==="multi"&&accept.length<2)return false;
  if(browseState.filter==="weak"&&!isWrongPile(q.id))return false;
  if(browseState.filter==="star"&&!STARS.has(q.id))return false;
  const term=normText(browseState.q.trim());
  if(term&&!normText(q.q+" "+q.o.join(" ")+" "+(q.ref||"")+" "+topicName(q)+" "+(KEY_DOUBTS[q.id]?.issue||"")).includes(term))return false;
  return true;
}
function drawList(){
  const list=$("#blist");if(!list)return;
  const rawTerm=browseState.q.trim();
  let res=QUESTIONS.filter(browsePass);
  const pages=Math.max(1,Math.ceil(res.length/PAGE_SIZE));
  browseState.page=Math.max(0,Math.min(browseState.page,pages-1));
  const start=browseState.page*PAGE_SIZE;
  list.innerHTML=`<div class="pager"><span class="muted small">${res.length} שאלות · עמוד ${browseState.page+1}/${pages}</span><span class="toolbar"><button type="button" class="btn" id="prev-page"${browseState.page===0?" disabled":""}>הקודם</button><button type="button" class="btn" id="next-page"${browseState.page>=pages-1?" disabled":""}>הבא</button></span></div>`;
  $("#prev-page")?.addEventListener("click",()=>{browseState.page--;drawList();});
  $("#next-page")?.addEventListener("click",()=>{browseState.page++;drawList();});
  res.slice(start,start+PAGE_SIZE).forEach(q=>{
    const it=el("div","qitem");
    const head=el("div","qhead");
    head.append(el("div","qq",highlight(q.q,rawTerm)),starButton(q.id,()=>drawList()));
    it.append(head);
    const accept=acceptedIndices(q);
    q.o.forEach((o,k)=>it.append(el("div","oo"+(accept.includes(k)?" c":""),`${LETTERS[k]}. ${highlight(o,rawTerm)}`)));
    const ex=EXP[q.id];
    if(ex)it.append(el("div","expl",`<div class="expl-h">הסבר</div>${escapeHtml(ex)}`));
    it.append(el("div","meta",`<span>${escapeHtml(yearLabel(q.t))}</span><span>${escapeHtml(topicName(q))}</span>${q.ref?`<span>${highlight(q.ref,rawTerm)}</span>`:""}${q.all_accepted?`<span style="color:var(--warn)">בוטלה בערעור</span>`:""}${accept.length>1&&!q.all_accepted?`<span style="color:var(--warn)">ריבוי תשובות</span>`:""}${q.vision?`<span style="color:var(--warn)">OCR</span>`:""}${KEY_DOUBTS[q.id]?`<span style="color:var(--warn)">דגל מפתח</span>`:""}`));
    list.append(it);
  });
}

/* ---------- STATS ---------- */
function renderStats(){
  const v=$("#view-stats");v.innerHTML="";
  sectionTitle(v,"stats-title","נתונים");
  const seen=QUESTIONS.filter(q=>isSeen(q.id)).length;
  let c=0,s=0;QUESTIONS.forEach(q=>{const r=PROG[q.id];if(r){c+=r.correct;s+=r.correct+r.wrong;}});
  const acc=s?Math.round(c/s*100):0;
  const head=el("div","card");
  head.innerHTML=`<div class="grid g3">
    <div class="stat"><div class="n">${seen}</div><div class="l">שאלות שנראו</div></div>
    <div class="stat"><div class="n">${s}</div><div class="l">תשובות</div></div>
    <div class="stat"><div class="n">${acc}%</div><div class="l">דיוק</div></div>
    <div class="stat"><div class="n">${STARS.size}</div><div class="l">שמורות</div></div></div>`;
  v.append(head);
  // per-topic accuracy
  v.append(el("h2","sec","דיוק לפי נושא"));
  const tp={};QUESTIONS.forEach(q=>{const r=PROG[q.id];if(r&&r.seen){(tp[q.ti]=tp[q.ti]||{c:0,t:0});tp[q.ti].c+=r.correct;tp[q.ti].t+=r.correct+r.wrong;}});
  const card=el("div","card");
  const keys=Object.keys(tp).map(Number).sort((a,b)=>(tp[b].t?tp[b].c/tp[b].t:0)-(tp[a].t?tp[a].c/tp[a].t:0));
  if(!keys.length)card.innerHTML='<div class="muted">עדיין אין נתונים — התחל לתרגל!</div>';
  keys.forEach(ti=>{
    const a=tp[ti].t?Math.round(tp[ti].c/tp[ti].t*100):0;
    const row=el("div");row.style.margin="9px 0";
    row.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:13.5px"><span>${escapeHtml(TOPICS[ti]||"")}</span><span class="muted">${a}% · ${tp[ti].t}</span></div>
      <div class="progbar" style="margin:4px 0 0"><i style="width:${a}%"></i></div>`;
    card.append(row);
  });
  v.append(card);
  v.append(el("h2","sec","ניהול נתונים"));
  const tools=el("div","grid g2");
  const exp=el("button","btn","ייצוא התקדמות");exp.onclick=exportProgress;
  const imp=el("button","btn","ייבוא התקדמות");
  const input=el("input","hidden");input.type="file";input.accept="application/json,.json";input.onchange=()=>input.files[0]&&importProgress(input.files[0]);
  imp.onclick=()=>input.click();
  const reset=el("button","btn warn","איפוס מלא");reset.setAttribute("aria-label","איפוס כל ההתקדמות, השמורות והסבב הפתוח");
  reset.onclick=()=>{if(confirm("לאפס את כל ההתקדמות, השמורות והסבב הפתוח? לא ניתן לשחזר בלי קובץ ייצוא.")){PROG={};STARS=new Set();clearActiveSession();saveProg();saveStars();toast("אופס");go("home");}};
  tools.append(exp,imp,reset,input);v.append(tools);
}

/* ---------- AI tutor ---------- */
function aiTutorHtml(){
  return `<div class="ai-box"><div class="expl-h">AI Tutor</div>
    <div class="ai-actions">
      <button type="button" class="btn" data-ai-mode="explain">הסבר קצר</button>
      <button type="button" class="btn" data-ai-mode="wrong">למה טעיתי?</button>
      <button type="button" class="btn" data-ai-mode="plan">תכנית חיזוק</button>
    </div>
    <div class="ai-output" role="status" aria-live="polite" aria-atomic="true"></div></div>`;
}
function wireAiButtons(root,q,k){
  root.querySelectorAll("[data-ai-mode]").forEach(b=>b.onclick=()=>askAi(b.dataset.aiMode,q,k,root.querySelector(".ai-output")));
}
function progressSummary(){
  const topics={};
  QUESTIONS.forEach(q=>{const r=PROG[q.id];if(r&&r.seen){const t=topicName(q);topics[t]=topics[t]||{seen:0,correct:0,total:0};topics[t].seen++;topics[t].correct+=r.correct;topics[t].total+=r.correct+r.wrong;}});
  const weak=Object.entries(topics).map(([topic,v])=>({topic,accuracy:v.total?Math.round(v.correct/v.total*100):0,seen:v.seen})).sort((a,b)=>a.accuracy-b.accuracy).slice(0,3);
  return {seen:QUESTIONS.filter(q=>isSeen(q.id)).length,starred:STARS.size,weak};
}
async function askAi(mode,q,k,out){
  out.textContent="טוען תשובת AI...";
  try{
    if(!EXP[q.id])await loadExplanations();
    const res=await authFetch("/api/ai-tutor",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      mode,selectedIndex:k,selectedLetter:Number.isInteger(k)?LETTERS[k]:null,
      question:{id:q.id,stem:q.q,options:q.o,acceptedIndices:acceptedIndices(q),acceptedLetters:acceptedIndices(q).map(i=>LETTERS[i]),allAccepted:!!q.all_accepted,ref:q.ref||"",topic:topicName(q),sitting:q.t,vision:!!q.vision},
      explanation:EXP[q.id]||"",keyDoubt:KEY_DOUBTS[q.id]||null,progressSummary:progressSummary()
    })});
    if(!res.ok){
      out.textContent=res.status===401?"יש להתחבר מחדש כדי להשתמש ב-AI Tutor.":[404,405,501].includes(res.status)?"AI Tutor אינו פעיל בפריסה הזו. יש לפרוס ב-Netlify ולהגדיר OPENAI_API_KEY.":`שגיאת AI (${res.status}).`;
      return;
    }
    const data=await res.json();
    out.innerHTML=`${escapeHtml(data.answer||"אין תשובה זמינה.")}${Array.isArray(data.citations)&&data.citations.length?`\n\nמקורות: ${data.citations.map(escapeHtml).join(" · ")}`:""}`;
  }catch(e){
    out.textContent="AI Tutor אינו זמין כרגע. התרגול המקומי ממשיך לעבוד כרגיל.";
  }
}

/* ---------- import / export ---------- */
function exportProgress(){
  const payload={version:1,exportedAt:new Date().toISOString(),progress:PROG,stars:[...STARS]};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`psychiatry-progress-${new Date().toISOString().slice(0,10)}.json`;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function importProgress(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data||typeof data!=="object"||!data.progress)throw new Error("bad file");
      if(!confirm("להחליף את ההתקדמות והשאלות השמורות בקובץ הייבוא?"))return;
      PROG=data.progress&&typeof data.progress==="object"?data.progress:{};
      STARS=new Set((Array.isArray(data.stars)?data.stars:[]).filter(id=>QMAP.has(id)));
      saveProg();saveStars();toast("הייבוא הושלם");renderStats();
    }catch(e){toast("קובץ הייבוא לא תקין");}
  };
  reader.readAsText(file);
}

/* ---------- service worker updates ---------- */
function registerServiceWorker(){
  if(!("serviceWorker" in navigator))return;
  navigator.serviceWorker.register("sw.js").then(reg=>{
    reg.update().catch(()=>{});
    if(reg.waiting)showUpdate(reg.waiting);
    reg.addEventListener("updatefound",()=>{
      const worker=reg.installing;
      if(worker)worker.addEventListener("statechange",()=>{
        if(worker.state==="installed"&&navigator.serviceWorker.controller)showUpdate(worker);
      });
    });
  }).catch(()=>{});
  let refreshing=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(refreshing)return;refreshing=true;location.reload();
  });
}
function showUpdate(worker){
  const banner=$("#update-banner");banner.classList.remove("hidden");
  $("#reload-update").onclick=()=>worker.postMessage({type:"SKIP_WAITING"});
}

document.addEventListener("keydown",e=>{
  if(nav!=="quiz"||!session)return;
  const key = e.key && /^[1-4]$/.test(e.key) ? e.key : (e.code&&/^Digit[1-4]$/.test(e.code) ? e.code.slice(-1) : "");
  if(key){const opts=$("#view-quiz .opts");if(opts&&!session.answered){e.preventDefault();opts.children[+key-1]?.click();}}
  if(e.key==="Enter"){
    if(session.mode==="exam"){const nb=$("#view-quiz .qfoot .examnext");if(nb){e.preventDefault();nb.click();}}
    else if(session.answered){const nx=$("#view-quiz .qfoot .primary");if(nx){e.preventDefault();nx.click();}}
  }
});
boot();
