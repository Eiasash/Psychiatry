/* ---------- BROWSE ---------- */
let browseState={q:"",ti:-1,filter:"all",page:0};
function renderBrowse(){
  const v=$("#view-browse");v.innerHTML="";
  sectionTitle(v,"browse-title","עיון");
  const s=el("input","search");s.placeholder="חיפוש בשאלות, תשובות, מקורות…";s.value=browseState.q;
  s.type="search";s.setAttribute("aria-label","חיפוש בשאלות, תשובות ומקורות");
  s.oninput=()=>{browseState.q=s.value;browseState.page=0;drawList();};
  v.append(s);
  const fc=el("div","chips");fc.style.margin="12px 0";
  [
    ["all","הכל"],["real","מקורי"],["ai","AI"],["ocr","OCR"],["keyDoubt","דגל מפתח"],["allAccepted","בוטלו"],["multi","ריבוי תשובות"],["weak","חלשות"],["star","שמורות"]
  ].forEach(([id,label])=>{
    const b=el("button","chip"+(browseState.filter===id?" on":""),label);
    b.setAttribute("aria-pressed",browseState.filter===id?"true":"false");
    b.onclick=()=>{browseState.filter=id;browseState.page=0;renderBrowse();};
    fc.append(b);
  });
  v.append(fc);
  // topic filter chips
  const tc=el("div","chips");tc.style.margin="12px 0";
  const all=el("button","chip"+(browseState.ti<0?" on":""),"כל הנושאים");all.setAttribute("aria-pressed",browseState.ti<0?"true":"false");all.onclick=()=>{browseState.ti=-1;browseState.page=0;renderBrowse();};
  tc.append(all);
  const tps={};browseCorpus().forEach(q=>tps[q.ti]=(tps[q.ti]||0)+1);
  Object.keys(tps).map(Number).sort((a,b)=>tps[b]-tps[a]).forEach(ti=>{
    const topic=TOPICS[ti]||"";
    const c=el("button","chip"+(browseState.ti===ti?" on":""),`${escapeHtml(topic)} <span class="c">${tps[ti]}</span>`);
    c.setAttribute("aria-label",`סנן לפי נושא ${topic}, ${tps[ti]} שאלות`);
    c.setAttribute("aria-pressed",browseState.ti===ti?"true":"false");
    c.onclick=()=>{browseState.ti=ti;browseState.page=0;renderBrowse();};tc.append(c);
  });
  v.append(tc);
  const list=el("div");list.id="blist";v.append(list);
  drawList();
}
// Browse corpus: unified by default; the "real"/"ai" chips narrow by provenance.
// Other chips (ocr/keyDoubt/...) are bank-only subsets and naturally exclude AI via browsePass.
function browseCorpus(){
  if(browseState.filter==="ai")return PRACTICE;
  if(browseState.filter==="real")return QUESTIONS;
  return QUESTIONS.concat(PRACTICE);
}
function browsePass(q){
  if(browseState.ti>=0&&q.ti!==browseState.ti)return false;
  const accept=acceptedIndices(q);
  if(browseState.filter==="ocr"&&!q.vision)return false;
  if(browseState.filter==="keyDoubt"&&!KEY_DOUBTS[q.id])return false;
  if(browseState.filter==="allAccepted"&&!q.all_accepted)return false;
  if(browseState.filter==="multi"&&accept.length<2)return false;
  if(browseState.filter==="weak"&&!isWrongPile(q.id))return false;
  if(browseState.filter==="star"&&!STARS.has(q.id))return false;
  const term=normText(browseState.q.trim());
  if(term&&!normText(q.q+" "+q.o.join(" ")+" "+(q.ref||"")+" "+topicName(q)+" "+(KEY_DOUBTS[q.id]?.issue||"")).includes(term))return false;
  return true;
}
function drawList(){
  const list=$("#blist");if(!list)return;
  const rawTerm=browseState.q.trim();
  let res=browseCorpus().filter(browsePass);
  const pages=Math.max(1,Math.ceil(res.length/PAGE_SIZE));
  browseState.page=Math.max(0,Math.min(browseState.page,pages-1));
  const start=browseState.page*PAGE_SIZE;
  list.innerHTML=`<div class="pager"><span class="muted small">${res.length} שאלות · עמוד ${browseState.page+1}/${pages}</span><span class="toolbar"><button type="button" class="btn" id="prev-page"${browseState.page===0?" disabled":""}>הקודם</button><button type="button" class="btn" id="next-page"${browseState.page>=pages-1?" disabled":""}>הבא</button></span></div>`;
  $("#prev-page")?.addEventListener("click",()=>{browseState.page--;drawList();});
  $("#next-page")?.addEventListener("click",()=>{browseState.page++;drawList();});
  res.slice(start,start+PAGE_SIZE).forEach(q=>{
    const it=el("div","qitem");
    const head=el("div","qhead");
    head.append(el("div","qq",highlightReadable(q.q,rawTerm)));
    if(!q.ai_generated)head.append(starButton(q.id,()=>drawList())); // starring is a verified-bank feature
    it.append(head);
    const accept=acceptedIndices(q);
    q.o.forEach((o,k)=>it.append(el("div","oo"+(accept.includes(k)?" c":""),`${LETTERS[k]}. ${highlightReadable(o,rawTerm)}`)));
    const ex=q.ai_generated?q.explanation:EXP[q.id];
    if(ex)it.append(el("div","expl",`<div class="expl-h">הסבר</div>${readableMixedText(ex)}`));
    const provLabel=q.ai_generated
      ?`<span style="color:var(--warn);font-weight:600" title="שאלת תרגול שנוצרה על-ידי AI ומבוססת על Synopsis — אינה חלק מבנק 900 השאלות הרשמי ואינה נספרת בנתונים">AI · תרגול</span>`
      :`<span>${escapeHtml(yearLabel(q.t))}</span>`;
    it.append(el("div","meta",`${provLabel}<span>${escapeHtml(topicName(q))}</span>${q.ref?`<span>${highlightReadable(q.ref,rawTerm)}</span>`:""}${q.all_accepted?`<span style="color:var(--warn)">בוטלה בערעור</span>`:""}${accept.length>1&&!q.all_accepted?`<span style="color:var(--warn)">ריבוי תשובות</span>`:""}${q.vision?`<span style="color:var(--warn)">OCR</span>`:""}${KEY_DOUBTS[q.id]?`<span style="color:var(--warn)">דגל מפתח</span>`:""}`));
    list.append(it);
  });
}

/* ---------- STATS ---------- */
function renderStats(){
  const v=$("#view-stats");v.innerHTML="";
  sectionTitle(v,"stats-title","נתונים");
  const seen=QUESTIONS.filter(q=>isSeen(q.id)).length;
  let c=0,s=0;QUESTIONS.forEach(q=>{const r=PROG[q.id];if(r){c+=r.correct;s+=r.correct+r.wrong;}});
  const acc=s?Math.round(c/s*100):0;
  const dueToday=dueTodayQuestionIds().length;
  const recent=recentMistakeIds().length;
  const weakTopic=weakestStudyTopic();
  const head=el("div","card");
  head.innerHTML=`<div class="grid g3">
    <div class="stat"><div class="n">${seen}</div><div class="l">שאלות שנראו</div></div>
    <div class="stat"><div class="n">${s}</div><div class="l">תשובות</div></div>
    <div class="stat"><div class="n">${acc}%</div><div class="l">דיוק</div></div>
    <div class="stat"><div class="n">${dueToday}</div><div class="l">לחזרה היום</div></div>
    <div class="stat"><div class="n">${recent}</div><div class="l">טעויות אחרונות</div></div>
    <div class="stat"><div class="n">${STARS.size}</div><div class="l">שמורות</div></div></div>
    <div class="muted small" style="margin-top:10px">${weakTopic?`נושא חלש מוצע: ${escapeHtml(weakTopic.topic)}${weakTopic.accuracy!==null?` · ${weakTopic.accuracy}%`:""} · נראה לאחרונה ${shortDate(weakTopic.last)}`:"אין עדיין נתוני נושא"}</div>`;
  v.append(head);
  // per-topic accuracy
  v.append(el("h2","sec","דיוק לפי נושא"));
  const card=el("div","card");
  const rows=topicStatsRows().filter(row=>row.seen||row.starred).sort((a,b)=>(b.weakScore-a.weakScore)||(b.total-a.total)||(b.count-a.count));
  if(!rows.length)card.innerHTML='<div class="muted">עדיין אין נתונים — התחל לתרגל!</div>';
  rows.forEach(rowData=>{
    const a=rowData.accuracy??0;
    const row=el("div","topic-stat-row");
    row.innerHTML=`<div class="topic-stat-meta"><span>${escapeHtml(rowData.topic)}</span><span class="muted">${rowData.accuracy===null?"—":`${rowData.accuracy}%`} · ${rowData.total} תשובות</span></div>
      <div class="progbar" style="margin:0"><i style="width:${a}%"></i></div>
      <div class="topic-stat-detail"><span>${rowData.due} לחזרה</span><span>${rowData.seen}/${rowData.count} נראו</span><span>${rowData.starred} שמורות</span><span>נראה לאחרונה ${shortDate(rowData.last)}</span></div>`;
    card.append(row);
  });
  v.append(card);
  v.append(el("h2","sec","ניהול נתונים"));
  const tools=el("div","grid g2");
  const exp=el("button","btn","ייצוא התקדמות");exp.onclick=exportProgress;
  const imp=el("button","btn","ייבוא התקדמות");
  const input=el("input","hidden");input.type="file";input.accept="application/json,.json";input.onchange=()=>input.files[0]&&importProgress(input.files[0]);
  imp.onclick=()=>input.click();
  const reset=el("button","btn warn","איפוס מלא");reset.setAttribute("aria-label","איפוס כל ההתקדמות, השמורות והסבב הפתוח");
  reset.onclick=()=>{if(confirm("לאפס את כל ההתקדמות, השמורות והסבב הפתוח? לא ניתן לשחזר בלי קובץ ייצוא.")){PROG={};STARS=new Set();clearActiveSession();saveProg();saveStars();toast("אופס");go("home");}};
  tools.append(exp,imp,reset,input);v.append(tools);
}

/* ---------- AI tutor ---------- */
const AI_TIMEOUT_MS=25000;
function aiModeLabel(mode){
  return mode==="wrong"?"ניתוח טעות":mode==="plan"?"תכנית חיזוק":"הסבר קצר";
}
function aiTutorHtml(){
  return `<div class="ai-box"><div class="expl-h">AI Tutor</div>
    <div class="ai-actions">
      <button type="button" class="btn" data-ai-mode="explain">הסבר קצר</button>
      <button type="button" class="btn" data-ai-mode="wrong">למה טעיתי?</button>
      <button type="button" class="btn" data-ai-mode="plan">תכנית חיזוק</button>
    </div>
    <div class="ai-output" role="status" aria-live="polite" aria-atomic="true"></div></div>`;
}
function wireAiButtons(root,q,k){
  root.querySelectorAll("[data-ai-mode]").forEach(b=>b.onclick=()=>askAi(b.dataset.aiMode,q,k,root.querySelector(".ai-output"),b));
}
function aiInlineMarkdown(s){
  return readableMixedText(s)
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
}
function aiTableCells(line){
  const txt=String(line||"").trim();
  if(!/^\|.*\|$/.test(txt))return null;
  const cells=txt.slice(1,-1).split("|").map(c=>c.trim());
  return cells.length>1?cells:null;
}
function aiTableDivider(line){
  const cells=aiTableCells(line);
  return !!cells&&cells.every(c=>/^:?-{3,}:?$/.test(c.replace(/\s+/g,"")));
}
function renderAiTable(headers,rows){
  const head=headers.map(c=>`<th>${aiInlineMarkdown(c)}</th>`).join("");
  const body=rows.map(row=>`<tr>${row.map((c,i)=>`<td data-label="${escapeHtml(headers[i]||"")}">${aiInlineMarkdown(c)}</td>`).join("")}</tr>`).join("");
  return `<table class="ai-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}
function renderAiMarkdown(text){
  const lines=String(text||"").replace(/\r\n?/g,"\n").split("\n");
  const html=[];
  let para=[];
  let inList=false;
  let inSection=false;
  const closeList=()=>{if(inList){html.push("</ul>");inList=false;}};
  const closeSection=()=>{if(inSection){closeList();html.push("</section>");inSection=false;}};
  const flushPara=()=>{
    if(!para.length)return;
    html.push(`<p>${para.map(aiInlineMarkdown).join("<br>")}</p>`);
    para=[];
  };
  for(let idx=0;idx<lines.length;idx++){
    const raw=lines[idx];
    const line=raw.trim();
    if(!line){flushPara();closeList();continue;}
    const tableHeaders=aiTableCells(line);
    const nextLine=lines[idx+1]||"";
    const nextCells=aiTableCells(nextLine);
    const hasTableDivider=aiTableDivider(nextLine);
    if(tableHeaders&&(hasTableDivider||nextCells)){
      flushPara();closeList();
      if(hasTableDivider)idx++;
      const rows=[];
      while(idx+1<lines.length){
        const cells=aiTableCells(lines[idx+1]);
        if(!cells||aiTableDivider(lines[idx+1]))break;
        rows.push(cells);
        idx++;
      }
      html.push(renderAiTable(tableHeaders,rows));
      continue;
    }
    if(/^[-*_]{3,}$/.test(line)){flushPara();closeList();html.push('<hr class="ai-rule">');continue;}
    const quote=line.match(/^[><]\s*(.+)$/);
    if(quote){flushPara();closeList();html.push(`<blockquote class="ai-quote">${aiInlineMarkdown(quote[1])}</blockquote>`);continue;}
    const heading=line.match(/^(#{1,4})\s+(.+)$/);
    if(heading){flushPara();closeSection();html.push(`<section class="ai-section"><h4>${aiInlineMarkdown(heading[2])}</h4>`);inSection=true;continue;}
    const bullet=line.match(/^[-*]\s+(.+)$/);
    if(bullet){
      flushPara();
      if(!inList){html.push("<ul>");inList=true;}
      html.push(`<li>${aiInlineMarkdown(bullet[1])}</li>`);
      continue;
    }
    closeList();
    para.push(line);
  }
  flushPara();
  closeList();
  closeSection();
  return html.join("")||"<p>אין תשובה זמינה.</p>";
}
function renderAiAnswer(out,data){
  out.removeAttribute("aria-busy");
  const answer=renderAiMarkdown(data?.answer||"אין תשובה זמינה.");
  const citations=Array.isArray(data?.citations)?data.citations.filter(c=>typeof c==="string"&&c.trim()).slice(0,6):[];
  const citationHtml=citations.length?`<div class="ai-citations"><span>מקורות:</span>${citations.map(c=>`<span>${escapeHtml(c)}</span>`).join("")}</div>`:"";
  const contractHtml='<div class="ai-source-contract" role="note"><b>מסגרת מקור</b><span>תשובת AI מבוססת רק על השאלה, ההסבר המקומי ומראי המקום שנשלחו.</span><span>המפתח הרשמי נשמר ללא שינוי; אין כאן ייעוץ קליני למטופל אמיתי.</span></div>';
  out.innerHTML=`<div class="ai-answer">${contractHtml}${answer}${citationHtml}</div>`;
}
function setAiButtons(root,disabled){
  root?.querySelectorAll("[data-ai-mode]").forEach(b=>{b.disabled=disabled;b.setAttribute("aria-disabled",disabled?"true":"false");});
}
function renderAiLoading(out,mode){
  out.setAttribute("aria-busy","true");
  out.innerHTML=`<div class="ai-status ai-loading"><b>טוען ${escapeHtml(aiModeLabel(mode))}...</b><span>אם החיבור איטי, הבקשה תיעצר אוטומטית ואפשר יהיה לנסות שוב.</span></div>`;
}
function renderAiError(out,message,onRetry){
  out.removeAttribute("aria-busy");
  out.innerHTML=`<div class="ai-status ai-error" role="alert"><b>${escapeHtml(message)}</b><span>התרגול המקומי ממשיך לעבוד כרגיל.</span><button type="button" class="btn" data-ai-retry>נסה שוב</button></div>`;
  const retry=out.querySelector("[data-ai-retry]");
  if(retry)retry.onclick=onRetry;
}
function progressSummary(){
  const topics={};
  QUESTIONS.forEach(q=>{const r=PROG[q.id];if(r&&r.seen){const t=topicName(q);topics[t]=topics[t]||{seen:0,correct:0,total:0};topics[t].seen++;topics[t].correct+=r.correct;topics[t].total+=r.correct+r.wrong;}});
  const weak=Object.entries(topics).map(([topic,v])=>({topic,accuracy:v.total?Math.round(v.correct/v.total*100):0,seen:v.seen})).sort((a,b)=>a.accuracy-b.accuracy).slice(0,3);
  return {seen:QUESTIONS.filter(q=>isSeen(q.id)).length,starred:STARS.size,weak};
}
async function askAi(mode,q,k,out,triggerBtn=null){
  const root=out?.closest(".ai-box");
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),AI_TIMEOUT_MS);
  renderAiLoading(out,mode);
  setAiButtons(root,true);
  try{
    if(!EXP[q.id])await loadExplanations();
    const res=await authFetch("/api/ai-tutor",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      mode,selectedIndex:k,selectedLetter:Number.isInteger(k)?LETTERS[k]:null,
      question:{id:q.id,stem:q.q,options:q.o,acceptedIndices:acceptedIndices(q),acceptedLetters:acceptedIndices(q).map(i=>LETTERS[i]),allAccepted:!!q.all_accepted,ref:q.ref||"",topic:topicName(q),sitting:q.t,vision:!!q.vision},
      explanation:EXP[q.id]||"",keyDoubt:KEY_DOUBTS[q.id]||null,progressSummary:progressSummary()
    }),signal:controller.signal});
    if(!res.ok){
      const msg=res.status===401?"יש להתחבר מחדש כדי להשתמש ב-AI Tutor.":[404,405,501].includes(res.status)?"AI Tutor אינו פעיל בפריסה הזו.":`שגיאת AI (${res.status}).`;
      renderAiError(out,msg,()=>askAi(mode,q,k,out,triggerBtn));
      return;
    }
    const data=await res.json();
    renderAiAnswer(out,data);
  }catch(e){
    const msg=e?.name==="AbortError"?"AI Tutor לקח יותר מדי זמן, הבקשה נעצרה.":"AI Tutor אינו זמין כרגע.";
    renderAiError(out,msg,()=>askAi(mode,q,k,out,triggerBtn));
  }finally{
    clearTimeout(timeout);
    setAiButtons(root,false);
    triggerBtn?.focus?.({preventScroll:true});
  }
}

/* ---------- import / export ---------- */
function exportProgress(){
  const payload={version:1,exportedAt:new Date().toISOString(),progress:PROG,stars:[...STARS]};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`psychiatry-progress-${new Date().toISOString().slice(0,10)}.json`;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function importProgress(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data||typeof data!=="object"||!data.progress)throw new Error("bad file");
      if(!confirm("להחליף את ההתקדמות והשאלות השמורות בקובץ הייבוא?"))return;
      PROG=data.progress&&typeof data.progress==="object"?data.progress:{};
      STARS=new Set((Array.isArray(data.stars)?data.stars:[]).filter(id=>QMAP.has(id)));
      saveProg();saveStars();toast("הייבוא הושלם");renderStats();
    }catch(e){toast("קובץ הייבוא לא תקין");}
  };
  reader.readAsText(file);
}

/* ---------- service worker updates ---------- */
function registerServiceWorker(){
  if(!("serviceWorker" in navigator))return;
  navigator.serviceWorker.register("sw.js").then(reg=>{
    reg.update().catch(()=>{});
    if(reg.waiting)showUpdate(reg.waiting);
    reg.addEventListener("updatefound",()=>{
      const worker=reg.installing;
      if(worker)worker.addEventListener("statechange",()=>{
        if(worker.state==="installed"&&navigator.serviceWorker.controller)showUpdate(worker);
      });
    });
    document.addEventListener("visibilitychange",()=>{
      if(document.visibilityState==="visible")reg.update().catch(()=>{});
    });
  }).catch(()=>{});
  let refreshing=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(refreshing)return;refreshing=true;location.reload();
  });
}
function showUpdate(worker){
  const banner=$("#update-banner");
  const reload=$("#reload-update");
  const dismiss=$("#dismiss-update");
  banner.classList.remove("hidden");
  banner.hidden=false;
  reload.disabled=false;
  reload.textContent="עדכן עכשיו";
  dismiss.onclick=()=>{banner.classList.add("hidden");banner.hidden=true;};
  reload.onclick=()=>{
    reload.disabled=true;
    reload.textContent="מעדכן...";
    worker.postMessage({type:"SKIP_WAITING"});
  };
}

document.addEventListener("keydown",e=>{
  if(nav!=="quiz"||!session)return;
  const key = e.key && /^[1-4]$/.test(e.key) ? e.key : (e.code&&/^Digit[1-4]$/.test(e.code) ? e.code.slice(-1) : "");
  if(key){const opts=$("#view-quiz .opts");if(opts&&!session.answered){e.preventDefault();opts.children[+key-1]?.click();}}
  if(e.key==="Enter"){
    if(session.mode==="exam"){const nb=$("#view-quiz .qfoot .examnext");if(nb){e.preventDefault();nb.click();}}
    else if(session.answered){const nx=$("#view-quiz .qfoot .primary");if(nx){e.preventDefault();nx.click();}}
  }
});
boot();
